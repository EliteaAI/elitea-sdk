name: "ZE01 - healthcheck: Verify Zephyr Essential API health"
description: |
  Verify the Zephyr Essential 'healthcheck' tool confirms API connectivity.

  Objective: Test API health check functionality

  Expected Behavior:
  - Health check executes without errors
  - Returns successful response
  - No error indicators in output

toolkits:
  - id: ${ZEPHYR_ESSENTIAL_TOOLKIT_ID}
    name: ${ZEPHYR_ESSENTIAL_TOOLKIT_NAME}

state:
  expected_success_indicators:
    type: list
    value: ["ok", "healthy", "success", "up"]
  error_indicators:
    type: list
    value: ["api_error", "connection_error", "timeout_error", "failed", "exception", "down", "unavailable"]
  healthcheck_result:
    type: str
  test_results:
    type: dict

entry_point: check_health
nodes:
  - id: check_health
    type: toolkit
    output:
      - healthcheck_result
    structured_output: false
    tool: healthcheck
    toolkit_name: ${ZEPHYR_ESSENTIAL_TOOLKIT_NAME}
    transition: validate_results

  - id: validate_results
    type: llm
    input:
      - healthcheck_result
      - expected_success_indicators
      - error_indicators
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: You are a strict quality assurance validator. Only return valid JSON.
      task:
        type: fstring
        value: |
          The 'healthcheck' tool was called and the pipeline reached this validation node successfully, which means the tool executed without raising an exception. Set tool_executed=true unconditionally.

          Healthcheck Raw Output (may be empty): "{healthcheck_result}"
          Expected Success Indicators: {expected_success_indicators}
          Error Indicators: {error_indicators}

          This is a POSITIVE test - we expect successful health check.

          RULE: The Zephyr Essential healthcheck API returns an empty body (HTTP 200/204) to signal success.
          - If the raw output is empty string or whitespace: tool_executed=true, no_errors=true, health_ok=true, test_passed=true.
          - Only set no_errors=false if the output EXPLICITLY contains one of the error_indicators strings.
          - Only set health_ok=false if the output EXPLICITLY contains one of the error_indicators strings.

          Validation Criteria (ALL must pass for test_passed=true):
          1. tool_executed: ALWAYS true - the pipeline reached this node, so the tool ran.
          2. no_errors: true if output is empty OR does not contain any error_indicators string.
          3. health_ok: true if output is empty OR contains a success indicator.

          Return JSON test_results:
          {{
            "test_passed": boolean (true only if ALL criteria pass),
            "tool_executed": boolean,
            "no_errors": boolean,
            "health_ok": boolean,
            "success_indicator_found": "which indicator was found or 'none'",
            "error_indicator_found": "which error indicator was found or 'none'",
            "error": string | null
          }}

          Return ONLY the JSON object.
    model: ${DEFAULT_LLM_MODEL}
    output:
      - test_results
    structured_output_dict:
      test_results: dict
    transition: END
