name: "TR26 delete section error handling"
priority: High
description: |
  Verify the delete_section tool handles invalid section IDs gracefully.

  Objective: Test error handling for a non-existent section.

  Expected Behavior:
  - Tool executes without crashing
  - Returns an appropriate error message for the invalid section ID
  - Error indicates the section was not found or cannot be accessed

toolkits:
  - id: ${TESTRAIL_TOOLKIT_ID}
    name: ${TESTRAIL_TOOLKIT_NAME}

state:
  section_id:
    type: str
    value: "999999999"
  tool_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_delete_section

nodes:
  - id: invoke_delete_section
    type: toolkit
    tool: delete_section
    toolkit_name: ${TESTRAIL_TOOLKIT_NAME}
    input:
      - section_id
    input_mapping:
      section_id:
        type: variable
        value: section_id
      soft_delete:
        type: fixed
        value: false
    output:
      - tool_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the delete_section tool with an invalid section ID.

          Tool Result: {tool_result}

          This test validates error handling for a non-existent section.

          Perform the following checks:
          1. Confirm the tool executed (result is not empty or null).
          2. Examine any error message for specific meaning. Valid error patterns for an invalid section ID include:
             - section does not exist or is invalid
             - section not found or cannot be accessed
             - "Unable to delete section" wrapper message
             - http error codes 404 (not found) or 400 (bad request)
          3. Determine if the error is about the invalid section ID itself.
             Errors like "Unable to delete section #999999999" are expected and correct.
             System errors unrelated to the invalid section ID are failures.

          Return a JSON object named test_results with the following structure:

          {{
            "test_passed": boolean (TRUE if error occurred as expected),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          Return **ONLY** the JSON object. No markdown, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
