name: "TR30 get run error handling"
priority: High
description: |
  Verify the get_run tool handles invalid run IDs gracefully.

  Objective: Test error handling for a non-existent test run.

  Expected Behavior:
  - Tool executes without crashing
  - Returns an appropriate error message for the invalid run ID
  - Error indicates the run was not found or cannot be accessed

toolkits:
  - id: ${TESTRAIL_TOOLKIT_ID}
    name: ${TESTRAIL_TOOLKIT_NAME}

state:
  run_id:
    type: str
    value: "999999999"
  tool_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_run

nodes:
  - id: invoke_get_run
    type: toolkit
    tool: get_run
    toolkit_name: ${TESTRAIL_TOOLKIT_NAME}
    input:
      - run_id
    input_mapping:
      run_id:
        type: variable
        value: run_id
    output:
      - tool_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the get_run tool with an invalid run ID.

          Tool Result: {tool_result}

          This test validates error handling for a non-existent test run.

          Perform the following checks:
          1. Confirm the tool executed (result is not empty or null).
          2. Examine any error message for specific meaning. Valid error patterns for an invalid run ID include:
             - run does not exist or is invalid
             - run not found or cannot be accessed
             - "TestRail API error" wrapper message
             - http error codes 404 (not found) or 400 (bad request)
          3. Determine if the error is about the invalid run ID itself.
             Errors like "Field :run_id is not a valid test run" are expected and correct.
             System errors unrelated to the invalid run ID are failures.

          Return a JSON object named test_results with the following structure:

          {{
            "test_passed": boolean (TRUE if error occurred as expected),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          Return **ONLY** the JSON object. No markdown, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
