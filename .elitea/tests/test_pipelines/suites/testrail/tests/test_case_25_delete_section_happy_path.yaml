name: "TR25 delete section happy path"
priority: Critical
description: |
  Verify the delete_section tool permanently removes an existing section.

  Objective: Test section deletion functionality.

  Workflow:
  - Discover a suite via get_suites
  - Create a throwaway section in that suite (setup)
  - Delete that section via delete_section and validate the deletion

  Expected Behavior:
  - delete_section executes successfully and confirms permanent deletion
  - No errors or exceptions during deletion

toolkits:
  - id: ${TESTRAIL_TOOLKIT_ID}
    name: ${TESTRAIL_TOOLKIT_NAME}

state:
  project_id:
    type: str
    value: "${TESTRAIL_PROJECT_ID}"
  name:
    type: str
    value: "Automated Section - TR25 - ${TIMESTAMP}"
  suites_result:
    type: dict
  suite_id:
    type: str
  setup_result:
    type: dict
  created_section_id:
    type: str
  tool_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_suites

nodes:
  - id: invoke_get_suites
    type: toolkit
    tool: get_suites
    toolkit_name: ${TESTRAIL_TOOLKIT_NAME}
    input:
      - project_id
    input_mapping:
      project_id:
        type: fstring
        value: "{project_id}"
    output:
      - suites_result
    structured_output: true
    transition: extract_suite_id

  - id: extract_suite_id
    type: code
    code:
      type: fixed
      value: |
        import re
        raw = elitea_state.get("suites_result", "")
        value = ""
        if isinstance(raw, (list, tuple)) and raw and isinstance(raw[0], dict) and "id" in raw[0]:
            value = str(raw[0]["id"])
        else:
            m = re.search(r"id\W+(\d+)", str(raw))
            value = m.group(1) if m else ""
        {"suite_id": value}
    input:
      - suites_result
    output:
      - suite_id
    structured_output: true
    transition: setup_add_section

  - id: setup_add_section
    type: toolkit
    tool: add_section
    toolkit_name: ${TESTRAIL_TOOLKIT_NAME}
    input:
      - project_id
      - name
      - suite_id
    input_mapping:
      project_id:
        type: fstring
        value: "{project_id}"
      name:
        type: variable
        value: name
      section_properties:
        type: fstring
        value: '{{"suite_id": {suite_id}, "description": "Section created by TR25 to be deleted"}}'
    output:
      - setup_result
    structured_output: true
    transition: extract_section_id

  - id: extract_section_id
    type: code
    code:
      type: fixed
      value: |
        import re
        raw = elitea_state.get("setup_result", "")
        m = re.search(r"id\W+(\d+)", str(raw))
        value = m.group(1) if m else ""
        {"created_section_id": value}
    input:
      - setup_result
    output:
      - created_section_id
    structured_output: true
    transition: invoke_delete_section

  - id: invoke_delete_section
    type: toolkit
    tool: delete_section
    toolkit_name: ${TESTRAIL_TOOLKIT_NAME}
    input:
      - created_section_id
    input_mapping:
      section_id:
        type: variable
        value: created_section_id
      soft_delete:
        type: fixed
        value: false
    output:
      - tool_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the tool execution results and determine if the test passed.

          tool executed: delete_section
          results: {tool_result}

          expected behavior:
          - delete_section executed successfully
          - the section was permanently deleted
          - result confirms successful deletion
          - no errors or exceptions

          Evaluate:
          1. did the tool execute successfully?
          2. are there any errors?
          3. does the output confirm the section was deleted?

          Return a JSON object with:
          {{
            "test_passed": true/false,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
