name: "TR27 get runs happy path"
priority: Critical
description: |
  Verify the get_runs tool retrieves the list of test runs for a project.

  Objective: Test basic test run listing functionality.

  Expected Behavior:
  - Tool executes successfully with project ID
  - Returns a list of test runs in JSON format (an empty list is a valid result)
  - Each run, when present, contains id and name fields
  - No errors or exceptions

toolkits:
  - id: ${TESTRAIL_TOOLKIT_ID}
    name: ${TESTRAIL_TOOLKIT_NAME}

state:
  project_id:
    type: str
    value: "${TESTRAIL_PROJECT_ID}"
  output_format:
    type: str
    value: "json"
  tool_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_runs

nodes:
  - id: invoke_get_runs
    type: toolkit
    tool: get_runs
    toolkit_name: ${TESTRAIL_TOOLKIT_NAME}
    input:
      - project_id
      - output_format
    input_mapping:
      project_id:
        type: fstring
        value: "{project_id}"
      output_format:
        type: variable
        value: output_format
    output:
      - tool_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the tool execution results and determine if the test passed.

          tool executed: get_runs
          results: {tool_result}

          expected behavior:
          - tool executed successfully
          - returned a list of test runs in json format (an empty list "[]" is valid)
          - if runs are present they contain run data with id and name fields
          - no errors or exceptions

          Evaluate:
          1. did the tool execute successfully?
          2. are there any errors?
          3. does the output contain a runs list (possibly empty)?

          Return a JSON object with:
          {{
            "test_passed": true/false,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
