name: "TR31 get results for run happy path"
priority: Critical
description: |
  Verify the get_results_for_run tool retrieves test results for a run.

  Objective: Test run-level results retrieval.

  Workflow:
  - List the project's runs via get_runs (setup)
  - Extract the first run id from the list
  - Retrieve that run's results via get_results_for_run and validate

  Expected Behavior:
  - get_results_for_run executes successfully for an existing run id
  - Returns a list of results in JSON format (an empty list is a valid result —
    a run may have no recorded results yet)
  - No errors or exceptions

  Note: requires the project to have at least one test run. If the project has no
  runs, the extractor yields no id and this test is expected to fail — seed a run
  or point TESTRAIL_PROJECT_ID at a project that has runs.

toolkits:
  - id: ${TESTRAIL_TOOLKIT_ID}
    name: ${TESTRAIL_TOOLKIT_NAME}

state:
  project_id:
    type: str
    value: "${TESTRAIL_PROJECT_ID}"
  output_format:
    type: str
    value: "json"
  runs_result:
    type: dict
  run_id:
    type: str
  tool_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_runs

nodes:
  - id: invoke_get_runs
    type: toolkit
    tool: get_runs
    toolkit_name: ${TESTRAIL_TOOLKIT_NAME}
    input:
      - project_id
      - output_format
    input_mapping:
      project_id:
        type: fstring
        value: "{project_id}"
      output_format:
        type: variable
        value: output_format
    output:
      - runs_result
    structured_output: true
    transition: extract_run_id

  - id: extract_run_id
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - runs_result
    input_mapping:
      system:
        type: fixed
        value: "You are a JSON data extractor."
      task:
        type: fstring
        value: |
          Extract a single test run ID from the list of runs.

          Runs Result: {runs_result}

          Find the first run object and extract its "id" field.
          Return ONLY the numeric run ID as a plain string with no additional text or formatting.

          Example: If the first run is {{"id": 42, "name": "Sprint 1"}}, return: 42
      chat_history:
        type: fixed
        value: []
    output:
      - run_id
    structured_output: true
    transition: invoke_get_results_for_run

  - id: invoke_get_results_for_run
    type: toolkit
    tool: get_results_for_run
    toolkit_name: ${TESTRAIL_TOOLKIT_NAME}
    input:
      - run_id
      - output_format
    input_mapping:
      run_id:
        type: variable
        value: run_id
      output_format:
        type: variable
        value: output_format
    output:
      - tool_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the tool execution results and determine if the test passed.

          tool executed: get_results_for_run
          results: {tool_result}

          expected behavior:
          - tool executed successfully for an existing run id
          - returned a list of results in json format (an empty list "[]" is valid)
          - no errors or exceptions

          Evaluate:
          1. did the tool execute successfully?
          2. are there any errors?
          3. does the output contain a results list (possibly empty)?

          Return a JSON object with:
          {{
            "test_passed": true/false,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
