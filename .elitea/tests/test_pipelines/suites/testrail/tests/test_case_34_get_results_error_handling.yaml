name: "TR34 get results error handling"
priority: High
description: |
  Verify the get_results tool handles invalid test IDs gracefully.

  Objective: Test error handling for a non-existent test.

  Expected Behavior:
  - Tool executes without crashing
  - Returns an appropriate error message for the invalid test ID
  - Error indicates the test was not found or cannot be accessed

toolkits:
  - id: ${TESTRAIL_TOOLKIT_ID}
    name: ${TESTRAIL_TOOLKIT_NAME}

state:
  test_id:
    type: str
    value: "999999999"
  tool_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_results

nodes:
  - id: invoke_get_results
    type: toolkit
    tool: get_results
    toolkit_name: ${TESTRAIL_TOOLKIT_NAME}
    input:
      - test_id
    input_mapping:
      test_id:
        type: variable
        value: test_id
    output:
      - tool_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the get_results tool with an invalid test ID.

          Tool Result: {tool_result}

          This test validates error handling for a non-existent test.

          Perform the following checks:
          1. Confirm the tool executed (result is not empty or null).
          2. Examine any error message for specific meaning. Valid error patterns for an invalid test ID include:
             - test does not exist or is invalid
             - test not found or cannot be accessed
             - "TestRail API error" wrapper message
             - http error codes 404 (not found) or 400 (bad request)
          3. Determine if the error is about the invalid test ID itself.
             Errors like "Field :test_id is not a valid test" are expected and correct.
             System errors unrelated to the invalid test ID are failures.

          Return a JSON object named test_results with the following structure:

          {{
            "test_passed": boolean (TRUE if error occurred as expected),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          Return **ONLY** the JSON object. No markdown, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
