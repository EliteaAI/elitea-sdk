name: "SP18 - get_files_list: Include/Exclude conflict (edge case)"
priority: High
description: |
  Verify the SharePoint 'get_files_list' tool handles conflicting include/skip extensions correctly.
  
  Objective: Test precedence when extensions appear in both include and skip lists
  
  Expected Behavior:
  - Tool executes successfully without errors
  - Test 1 (Partial Conflict): When extension is in BOTH include and skip, skip takes precedence
  - Test 2 (Full Conflict): When skip == include (identical lists), skip wins for all extensions
  - Demonstrates that exclusion rules always override inclusion rules
  - Must return files (baseline should have test data)

toolkits:
  - id: ${SHAREPOINT_TOOLKIT_ID}
    name: ${SHAREPOINT_TOOLKIT_NAME}

state:
  folder_name:
    type: str
    value: "${DOCUMENT_RELATIVE_PATH}"
  limit_files:
    type: int
    value: 50
  include_all:
    type: list
    value: ["txt", "pdf", "docx", "png"]
  skip_txt:
    type: list
    value: ["txt"]
  include_txt_pdf:
    type: list
    value: ["txt", "pdf"]
  skip_txt_conflict:
    type: list
    value: ["txt"]
  include_same:
    type: list
    value: ["txt", "pdf"]
  skip_same:
    type: list
    value: ["txt", "pdf"]
  files_result_baseline:
    type: dict
  files_result_conflict:
    type: dict
  files_result_equal_conflict:
    type: dict
  test_results:
    type: dict

entry_point: invoke_baseline

nodes:
  - id: invoke_baseline
    type: toolkit
    tool: get_files_list
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - folder_name
      - limit_files
      - include_all
    input_mapping:
      folder_name:
        type: variable
        value: folder_name
      limit_files:
        type: variable
        value: limit_files
      include_extensions:
        type: variable
        value: include_all
    output:
      - files_result_baseline
    structured_output: true
    transition: invoke_conflict_test

  - id: invoke_conflict_test
    type: toolkit
    tool: get_files_list
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - folder_name
      - limit_files
      - include_txt_pdf
      - skip_txt_conflict
    input_mapping:
      folder_name:
        type: variable
        value: folder_name
      limit_files:
        type: variable
        value: limit_files
      include_extensions:
        type: variable
        value: include_txt_pdf
      skip_extensions:
        type: variable
        value: skip_txt_conflict
    output:
      - files_result_conflict
    structured_output: true
    transition: invoke_equal_conflict_test

  - id: invoke_equal_conflict_test
    type: toolkit
    tool: get_files_list
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - folder_name
      - limit_files
      - include_same
      - skip_same
    input_mapping:
      folder_name:
        type: variable
        value: folder_name
      limit_files:
        type: variable
        value: limit_files
      include_extensions:
        type: variable
        value: include_same
      skip_extensions:
        type: variable
        value: skip_same
    output:
      - files_result_equal_conflict
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: ${DEFAULT_LLM_MODEL}
    input:
      - files_result_baseline
      - files_result_conflict
      - files_result_equal_conflict
      - include_txt_pdf
      - skip_txt_conflict
      - include_same
      - skip_same
    input_mapping:
      system:
        type: fixed
        value: |
          You are a JSON data validator. Analyze the provided arrays and return a verdict.
          IMPORTANT: Base your answer ONLY on the actual "Name" field values in each array.
          Do NOT hallucinate or assume data that is not present.
      task:
        type: fstring
        value: |
          Analyze these three file listing results:

          BASELINE: {files_result_baseline}
          TEST_1: {files_result_conflict}
          TEST_2: {files_result_equal_conflict}

          Answer these YES/NO questions by examining the "Name" field of each file:

          Q1: Is BASELINE a non-empty array (has at least 1 file)?
          Q2: In TEST_1, are there any files where "Name" ends with ".txt"?
          Q3: In TEST_1, do ALL files have "Name" ending with ".pdf"?
          Q4: Is TEST_2 an empty array []?

          PASS CRITERIA:
          - Q1 must be YES (baseline has files)
          - Q2 must be NO (no .txt files in test 1)
          - Q3 must be YES (only .pdf files in test 1) OR TEST_1 is empty
          - Q4 must be YES (test 2 is empty)

          If ALL criteria are met -> test_passed: true
          If ANY criterion fails -> test_passed: false

          Return ONLY valid JSON:
          {{"test_passed": true/false, "summary": "Q1=YES/NO, Q2=YES/NO, Q3=YES/NO, Q4=YES/NO", "error": null, "result_sameple_conflict": []}}
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: dict
    transition: END
