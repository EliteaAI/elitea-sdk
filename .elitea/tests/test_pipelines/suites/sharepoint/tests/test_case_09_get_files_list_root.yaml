name: "SP09 - get_files_list: List root files"
priority: Critical
description: |
  Verify the SharePoint 'get_files_list' tool lists files in root document library.
  
  Objective: Test basic file listing in Shared Documents root
  
  Expected Behavior:
  - Tool executes successfully without errors
  - Returns array of file objects
  - Each file contains Name, Path, Created, Modified, Link fields
  - Limit parameter is respected (default 100)
  - System files/folders are excluded

toolkits:
  - id: ${SHAREPOINT_TOOLKIT_ID}
    name: ${SHAREPOINT_TOOLKIT_NAME}

state:
  folder_name:
    type: str
    value: ""
  limit_files:
    type: int
    value: 50
  files_result:
    type: dict
  expected_fields:
    type: list
    value: ["Name", "Path", "Created", "Modified", "Link"]
  error_indicators:
    type: list
    value: ["error", "failed", "exception"]
  test_results:
    type: dict

entry_point: invoke_get_files_list

nodes:
  - id: invoke_get_files_list
    type: toolkit
    tool: get_files_list
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - folder_name
      - limit_files
    input_mapping:
      folder_name:
        type: variable
        value: folder_name
      limit_files:
        type: variable
        value: limit_files
    output:
      - files_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - files_result
      - limit_files
      - expected_fields
      - error_indicators
    input_mapping:
      system:
        type: fixed
        value: "you are a quality assurance validator."
      task:
        type: fstring
        value: |
          analyze the output from the 'get_files_list' tool execution.

          tool executed: get_files_list
          folder: root (empty string - lists files across all document libraries on the site)
          limit: {limit_files}
          results: {files_result}
          expected fields: {expected_fields}

          expected behavior:
          - tool executes successfully without errors (failure means output starts with "Tool execution error!" or contains an authentication error)
          - returns a non-empty array of file objects
          - file objects contain Name, Path, Created, and Link fields (Modified may be absent for some items - do NOT fail on missing Modified)
          - number of files does not exceed the limit
          - files may come from any document library or subfolder on the site (this is expected for root listing)

          evaluate:
          1. did the tool execute successfully? (check for "Tool execution error!" prefix only — do NOT check field presence for this criterion)
          2. is the result a non-empty array?
          3. does the FIRST item in the array contain Name, Path, Created, and Link fields? (check only the first item)
          4. is the total file count within the specified limit ({limit_files})?

          IMPORTANT: Do NOT iterate over all items to check field presence. Only check the first item. Do NOT fail the test because Modified is absent from some items.

          return a json object with:
          {{
            "test_passed": true/false,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          return **only** the json object. no markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
