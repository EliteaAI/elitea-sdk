name: "SP15 - get_files_list: Skip specific file extensions"
priority: High
description: |
  Verify the SharePoint 'get_files_list' tool filters out files using skip_extensions parameter.
  
  Objective: Test that files with specified extensions are excluded from results
  
  Expected Behavior:
  - Tool executes successfully without errors
  - Returns all files EXCEPT those with extensions in skip_extensions list
  - Extensions are matched case-insensitively
  - Accepts both 'exe' and '.exe' formats
  - All files returned if skip list doesn't match any files

toolkits:
  - id: ${SHAREPOINT_TOOLKIT_ID}
    name: ${SHAREPOINT_TOOLKIT_NAME}

state:
  folder_name:
    type: str
    value: "${DOCUMENT_RELATIVE_PATH}"
  limit_files:
    type: int
    value: 50
  skip_txt:
    type: list
    value: ["txt"]
  skip_multiple:
    type: list
    value: [".pdf", ".docx", ".png"]
  files_result_skip_txt:
    type: dict
  files_result_skip_multiple:
    type: dict
  files_result_all:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_files_all

nodes:
  - id: invoke_get_files_all
    type: toolkit
    tool: get_files_list
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - folder_name
      - limit_files
    input_mapping:
      folder_name:
        type: variable
        value: folder_name
      limit_files:
        type: variable
        value: limit_files
    output:
      - files_result_all
    structured_output: true
    transition: invoke_get_files_skip_txt

  - id: invoke_get_files_skip_txt
    type: toolkit
    tool: get_files_list
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - folder_name
      - limit_files
      - skip_txt
    input_mapping:
      folder_name:
        type: variable
        value: folder_name
      limit_files:
        type: variable
        value: limit_files
      skip_extensions:
        type: variable
        value: skip_txt
    output:
      - files_result_skip_txt
    structured_output: true
    transition: invoke_get_files_skip_multiple

  - id: invoke_get_files_skip_multiple
    type: toolkit
    tool: get_files_list
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - folder_name
      - limit_files
      - skip_multiple
    input_mapping:
      folder_name:
        type: variable
        value: folder_name
      limit_files:
        type: variable
        value: limit_files
      skip_extensions:
        type: variable
        value: skip_multiple
    output:
      - files_result_skip_multiple
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: ${DEFAULT_LLM_MODEL}
    input:
      - files_result_all
      - files_result_skip_txt
      - files_result_skip_multiple
      - skip_txt
      - skip_multiple
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the 'get_files_list' tool execution with skip_extensions filter.

          Baseline - No filter (all files returned):
          Result: {files_result_all}

          Test 1 - skip_extensions={skip_txt} (skip .txt files, keep all others):
          Result: {files_result_skip_txt}

          Test 2 - skip_extensions={skip_multiple} (skip .pdf/.docx/.png files, keep all others):
          Result: {files_result_skip_multiple}

          How skip_extensions works:
          - Files whose extension matches any entry in skip_extensions are EXCLUDED from results
          - Files whose extension does NOT match are INCLUDED (kept) in results
          - Both "txt" and ".txt" formats are accepted (dot is optional)

          Validation rules (check each independently):
          1. Baseline result must be a valid list (not an error string) and non-empty
          2. Test 1 result must be a valid list (not an error string)
          3. Test 2 result must be a valid list (not an error string)
          4. Test 1: count the .txt files in the result — there must be ZERO .txt files
          5. Test 1: count must be less than baseline count (at least one .txt was filtered)
          6. Test 2: count the .pdf files in the result — there must be ZERO .pdf files
          7. Test 2: count the .docx files in the result — there must be ZERO .docx files
          8. Test 2: count the .png files in the result — there must be ZERO .png files
          9. Test 2: count must be less than baseline count (at least one file was filtered)
          10. Test 1 MAY contain .docx, .pdf, .png files — those are expected and correct (they were NOT skipped)
          11. Test 2 MAY contain .txt files — those are expected and correct (they were NOT skipped)

          Determine test_passed:
          - true if ALL rules 1-9 pass
          - false if ANY rule fails

          return a json object with:
          {{
            "test_passed": true/false,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed",
            "Result_1": {files_result_skip_txt},
            "Result_2": {files_result_skip_multiple}
          }}

          return **only** the json object. no markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: dict
    transition: END
