name: "PST21 update collection"
priority: High
description: |
  Validates that the update_collection_description tool handles updating
  the default collection with an empty or minimal description.
  
  Objective: Verify handling of empty description updates
  
  Expected Behavior:
  - Tool executes successfully on the default collection
  - Empty description is accepted and applied
  - Returns confirmation of the update
  - Collection description is cleared or set to empty

toolkits:
  - id: ${POSTMAN_TOOLKIT_ID}
    name: ${POSTMAN_TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  new_description:
    type: str
    value: ""
    
entry_point: invoke_update_collection_description

nodes:
  - id: invoke_update_collection_description
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: update_collection_description
    input:
      - new_description
    input_mapping:
      description:
        type: variable
        value: new_description
    output:
      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'update_collection_description' tool with empty description.
          
          Tool Result: {tool_result}
          
          This test validates that update_collection_description handles empty descriptions on the default collection.
          
          Perform the following checks:
          1. Confirm the update tool executed successfully without raising an error.
          2. Verify the result contains a collection object with id and name fields.
          3. Verify the result contains a 'description' field (it may be present as a key even if null).
          4. Verify the description represents an empty/cleared value: accept null OR empty string "" as both indicate no description is set (Postman API normalizes empty string to null).
          5. Validate no error message is present in the result.
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if all checks pass),
            "update_succeeded": boolean,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
