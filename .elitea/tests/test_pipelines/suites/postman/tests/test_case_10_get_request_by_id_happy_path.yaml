name: "PST10 - get_request_by_id: Retrieve request by ID"
priority: Critical
description: |
  Validates that the get_request_by_id tool successfully retrieves a specific
  API request using its unique identifier.
  
  Objective: Verify request retrieval by ID
  
  Expected Behavior:
  - Duplicate collection is created for testing
  - Test folder and request are created in duplicate
  - Request ID is extracted from creation result
  - get_request_by_id retrieves the request by ID
  - Returns complete request details
  - Duplicate collection is cleaned up

toolkits:
  - id: ${POSTMAN_TOOLKIT_ID}
    name: ${POSTMAN_TOOLKIT_NAME}

state:
  duplicate_name:
    type: str
  duplicate_result:
    type: str
  duplicate_id:
    type: str
  folder_name:
    type: str
  request_name:
    type: str
  request_method:
    type: str
    value: "POST"
  request_url:
    type: str
    value: "https://api.example.com/create"
  folder_path:
    type: str
  request_path:
    type: str
  request_id:
    type: str
  create_folder_result:
    type: str
  create_request_result:
    type: str
  get_by_path_result:
    type: str
  get_request_result:
    type: str
  delete_result:
    type: str
  test_results:
    type: dict

entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        
        # Generate unique names
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        random_suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        duplicate_name = f"PST10_Collection_{timestamp}_{random_suffix}"
        folder_name = f"PST10_Folder_{timestamp}_{random_suffix}"
        request_name = f"PST10_Request_{timestamp}_{random_suffix}"
        
        # Build paths
        folder_path = folder_name
        request_path = f"{folder_name}/{request_name}"
        
        {
          "duplicate_name": duplicate_name,
          "folder_name": folder_name,
          "request_name": request_name,
          "folder_path": folder_path,
          "request_path": request_path
        }
    output:
      - duplicate_name
      - folder_name
      - request_name
      - folder_path
      - request_path
    structured_output: true
    transition: duplicate_collection

  - id: duplicate_collection
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: duplicate_collection
    input:
      - duplicate_name
    input_mapping:
      new_name:
        type: variable
        value: duplicate_name
    output:
      - duplicate_result
    structured_output: true
    transition: extract_duplicate_id

  - id: extract_duplicate_id
    type: code
    code:
      type: fstring
      value: |
        import json
        import re
        
        result_str = elitea_state.get('duplicate_result', '')
        duplicate_id = None
        
        try:
            result_data = json.loads(result_str)
            if isinstance(result_data, dict) and 'collection' in result_data:
                coll = result_data['collection']
                duplicate_id = coll.get('id') or coll.get('uid')
                if not duplicate_id and 'info' in coll:
                    duplicate_id = coll['info'].get('_postman_id') or coll['info'].get('uid')
        except:
            pass
        
        if not duplicate_id:
            id_match = re.search(r'"(?:id|uid|_postman_id)"\s*:\s*"([^"]+)"', result_str)
            if id_match:
                duplicate_id = id_match.group(1)
        
        duplicate_id or "ID_NOT_FOUND"
    input:
      - duplicate_result
    output:
      - duplicate_id
    structured_output: true
    transition: create_test_folder

  - id: create_test_folder
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_folder
    input:
      - duplicate_id
      - folder_name
    input_mapping:
      collection_id:
        type: variable
        value: duplicate_id
      name:
        type: variable
        value: folder_name
    output:
      - create_folder_result
    structured_output: true
    transition: create_test_request

  - id: create_test_request
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_request
    input:
      - duplicate_id
      - folder_path
      - request_name
      - request_method
      - request_url
    input_mapping:
      collection_id:
        type: variable
        value: duplicate_id
      folder_path:
        type: variable
        value: folder_path
      name:
        type: variable
        value: request_name
      method:
        type: variable
        value: request_method
      url:
        type: variable
        value: request_url
    output:
      - create_request_result
    structured_output: true
    transition: get_request_by_path_for_id

  - id: get_request_by_path_for_id
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: get_request_by_path
    input:
      - duplicate_id
      - request_path
    input_mapping:
      collection_id:
        type: variable
        value: duplicate_id
      request_path:
        type: variable
        value: request_path
    output:
      - get_by_path_result
    structured_output: true
    transition: extract_request_id

  - id: extract_request_id
    type: code
    code:
      type: fstring
      value: |
        import json
        import re

        result_str = elitea_state.get('get_by_path_result', '')

        # Try to extract ID from result
        request_id = None

        # Pattern 1: Look for "id": "..."
        id_match = re.search(r'"id"\s*:\s*"([^"]+)"', result_str)
        if id_match:
            request_id = id_match.group(1)

        # Pattern 2: Look for "uid": "..."
        if not request_id:
            uid_match = re.search(r'"uid"\s*:\s*"([^"]+)"', result_str)
            if uid_match:
                request_id = uid_match.group(1)

        # Pattern 3: Try JSON parse
        if not request_id:
            try:
                result_data = json.loads(result_str)
                if isinstance(result_data, dict):
                    request_id = result_data.get('id') or result_data.get('uid')
                    if not request_id and 'request' in result_data:
                        req = result_data['request']
                        if isinstance(req, dict):
                            request_id = req.get('id') or req.get('uid')
            except:
                pass

        request_id or "ID_NOT_FOUND"
    input:
      - get_by_path_result
    output:
      - request_id
    structured_output: true
    transition: get_request_by_id

  - id: get_request_by_id
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: get_request_by_id
    input:
      - request_id
    input_mapping:
      request_id:
        type: variable
        value: request_id
    output:
      - get_request_result
    structured_output: true
    transition: cleanup_delete_collection

  - id: cleanup_delete_collection
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_collection
    input:
      - duplicate_id
    input_mapping:
      collection_id:
        type: variable
        value: duplicate_id
    output:
      - delete_result
    structured_output: true
    transition: validate_results

  - id: validate_results
    type: llm
    model: ${DEFAULT_LLM_MODEL}
    input:
      - duplicate_result
      - duplicate_id
      - create_folder_result
      - create_request_result
      - get_by_path_result
      - request_id
      - get_request_result
      - request_name
      - request_method
      - delete_result
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: "You are a strict quality assurance validator. Only return valid JSON."
      task:
        type: fstring
        value: |
          Analyze the output from Postman request operations using ID retrieval.
          
          Duplicate Result: {duplicate_result}
          Duplicate ID: {duplicate_id}
          Folder Creation Result: {create_folder_result}
          Request Creation Result: {create_request_result}
          Extracted Request ID: {request_id}
          Get Request Result: {get_request_result}
          Expected Request Name: {request_name}
          Expected Method: {request_method}
          Delete Result: {delete_result}
          
          This is a POSITIVE test - we expect successful ID-based request retrieval.
          
          Validation Criteria (ALL must pass for test_passed=true):
          1. duplicate_created: Collection was duplicated successfully
          2. id_extracted_from_duplicate: Duplicate collection ID was extracted
          3. folder_created: Folder was created successfully in duplicate
          4. request_created: Request was created successfully in duplicate
          5. request_id_extracted: Request ID was extracted (not "ID_NOT_FOUND")
          6. request_retrieved: get_request_by_id returned request details
          7. correct_name: Request name matches expected
          8. correct_method: Request method matches expected
          9. no_errors: No error indicators in any output
          10. cleanup_succeeded: Duplicate collection was deleted successfully
          
          Return JSON test_results:
          {{
            "test_passed": boolean (true only if ALL criteria pass),
            "duplicate_created": boolean,
            "id_extracted_from_duplicate": boolean,
            "folder_created": boolean,
            "request_created": boolean,
            "request_id_extracted": boolean,
            "request_retrieved": boolean,
            "correct_name": boolean,
            "correct_method": boolean,
            "no_errors": boolean,
            "cleanup_succeeded": boolean,
            "extracted_request_id": "the request ID or null",
            "summary": "brief description of outcome",
            "error": string | null
          }}
          
          Return ONLY the JSON object. No markdown formatting.
    output:
      - test_results
    structured_output_dict:
      test_results: dict
    transition: END
