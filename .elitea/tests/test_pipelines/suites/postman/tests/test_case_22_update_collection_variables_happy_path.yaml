name: "PST22 update collection"
priority: Critical
description: |
  Validates that the update_collection_variables tool successfully updates
  collection-level variables.
  
  Objective: Verify collection variables update functionality
  
  Expected Behavior:
  - Duplicate collection is created for testing
  - Tool executes successfully on the duplicate
  - Collection variables are updated
  - Variable structure includes key, value, type, enabled
  - Returns confirmation of the update
  - Duplicate collection is cleaned up successfully

toolkits:
  - id: ${POSTMAN_TOOLKIT_ID}
    name: ${POSTMAN_TOOLKIT_NAME}

state:
  duplicate_name:
    type: str
  duplicate_result:
    type: str
  duplicate_id:
    type: str
  tool_result:
    type: dict
  delete_result:
    type: str
  test_results:
    type: dict
  variables:
    type: list
    value:
      - key: "test_var"
        value: "test_value"
        type: "string"
        enabled: true

entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        random_suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        duplicate_name = f"PST22_UpdateVars_{timestamp}_{random_suffix}"
        
        {"duplicate_name": duplicate_name}
    output:
      - duplicate_name
    structured_output: true
    transition: duplicate_collection

  - id: duplicate_collection
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: duplicate_collection
    input:
      - duplicate_name
    input_mapping:
      new_name:
        type: variable
        value: duplicate_name
    output:
      - duplicate_result
    structured_output: true
    transition: extract_duplicate_id

  - id: extract_duplicate_id
    type: code
    code:
      type: fstring
      value: |
        import json
        import re
        
        result_str = elitea_state.get('duplicate_result', '')
        duplicate_id = None
        
        try:
            result_data = json.loads(result_str)
            if isinstance(result_data, dict) and 'collection' in result_data:
                coll = result_data['collection']
                duplicate_id = coll.get('id') or coll.get('uid')
                if not duplicate_id and 'info' in coll:
                    duplicate_id = coll['info'].get('_postman_id') or coll['info'].get('uid')
        except:
            pass
        
        if not duplicate_id:
            id_match = re.search(r'"(?:id|uid|_postman_id)"\s*:\s*"([^"]+)"', result_str)
            if id_match:
                duplicate_id = id_match.group(1)
        
        duplicate_id or "ID_NOT_FOUND"
    input:
      - duplicate_result
    output:
      - duplicate_id
    structured_output: true
    transition: invoke_update_collection_variables

  - id: invoke_update_collection_variables
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: update_collection_variables
    input:
      - duplicate_id
      - variables
    input_mapping:
      collection_id:
        type: variable
        value: duplicate_id
      variables:
        type: variable
        value: variables
    output:
      - tool_result
    structured_output: true
    transition: cleanup_delete_collection

  - id: cleanup_delete_collection
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_collection
    input:
      - duplicate_id
    input_mapping:
      collection_id:
        type: variable
        value: duplicate_id
    output:
      - delete_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - duplicate_result
      - duplicate_id
      - tool_result
      - delete_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'update_collection_variables' tool.
          
          Duplicate Result: {duplicate_result}
          Duplicate ID: {duplicate_id}
          Tool Result: {tool_result}
          Delete Result: {delete_result}
          
          This test validates that update_collection_variables updates variables on a duplicate collection.
          
          Perform the following checks:
          1. Confirm duplicate collection was created successfully.
          2. Confirm the update tool executed successfully without raising an error.
          3. Verify the result contains a collection object with id and name fields.
          4. Verify the result contains a 'variable' array.
          5. Verify the variable array has at least one entry with key="test_var", value="test_value", and type="string".
          6. Validate no error message is present in the result.
          7. Confirm the duplicate collection was deleted successfully (delete_result should not contain errors).
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if all checks pass),
            "duplicate_created": boolean,
            "update_succeeded": boolean,
            "variables_updated": boolean,
            "cleanup_succeeded": boolean,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
