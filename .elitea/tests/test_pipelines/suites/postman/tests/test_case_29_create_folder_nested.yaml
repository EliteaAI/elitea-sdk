name: "PST29 create folder nested"
priority: High
description: |
  Validates that the create_folder tool successfully creates a folder
  nested inside a parent folder using the parent_path parameter.
  
  Objective: Verify nested folder creation
  
  Expected Behavior:
  - Tool executes successfully
  - Folder is created inside the specified parent
  - Parent-child relationship is established
  - Returns folder ID and confirmation

toolkits:
  - id: ${POSTMAN_TOOLKIT_ID}
    name: ${POSTMAN_TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  folder_name:
    type: str
    value: "Nested Folder"
  parent_path:
    type: str
  parent_folder_name:
    type: str
  create_parent_result:
    type: str
  delete_parent_result:
    type: str
entry_point: prepare_parent_folder

nodes:
  - id: prepare_parent_folder
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        parent_folder_name = f"PST29_Parent_{timestamp}_{suffix}"
        {"parent_folder_name": parent_folder_name, "parent_path": parent_folder_name}
    output:
      - parent_folder_name
      - parent_path
    structured_output: true
    transition: create_parent_folder

  - id: create_parent_folder
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_folder
    input:
      - parent_folder_name
    input_mapping:
      name:
        type: variable
        value: parent_folder_name
    output:
      - create_parent_result
    structured_output: true
    transition: invoke_create_folder

  - id: invoke_create_folder
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_folder
    input:
      - folder_name
      - parent_path
    input_mapping:
      name:
        type: variable
        value: folder_name
      parent_path:
        type: variable
        value: parent_path
    output:

      - tool_result
    structured_output: true
    transition: process_results

  - id: cleanup_parent_folder
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_folder
    input:
      - parent_folder_name
    input_mapping:
      folder_path:
        type: variable
        value: parent_folder_name
    output:
      - delete_parent_result
    structured_output: true
    transition: END

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'create_folder' tool for nested folder creation.
          
          Tool Result: {tool_result}
          
          This test validates that create_folder creates a nested folder.
          
          Perform the following checks:
          1. Confirm the tool executed successfully.
          2. Verify the result contains a success message indicating the nested folder was created.
          3. Note: The create_folder tool returns only a message string (e.g. "Folder '...' created successfully") - no folder ID is returned. This is the expected response format.
          4. Validate no error message is present in the result.
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if result contains a success message about folder creation and no error),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: cleanup_parent_folder
