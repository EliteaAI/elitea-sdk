name: "PST13 get request script"
priority: High
description: |
  Validates that the get_request_script tool successfully retrieves pre-request
  script content from the default collection when script_type is set to "prerequest".
  
  Objective: Verify pre-request script retrieval
  
  Expected Behavior:
  - Tool executes successfully
  - Returns pre-request script content
  - Properly distinguishes pre-request from test scripts
  - Handles requests with no pre-request scripts gracefully

toolkits:
  - id: ${POSTMAN_TOOLKIT_ID}
    name: ${POSTMAN_TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  request_path:
    type: str
  request_name:
    type: str
  request_id:
    type: str
  create_request_result:
    type: str
  delete_result:
    type: str
  script_type:
    type: str
    value: "prerequest"
entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        request_name = f"PST13_Request_{timestamp}_{suffix}"
        {
          "request_name": request_name,
          "request_path": request_name
        }
    output:
      - request_name
      - request_path
    structured_output: true
    transition: create_test_request

  - id: create_test_request
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_request
    input:
      - request_name
    input_mapping:
      name:
        type: variable
        value: request_name
      method:
        type: fixed
        value: "GET"
      url:
        type: fixed
        value: "https://api.example.com/test"
      pre_request_script:
        type: fixed
        value: "pm.environment.set('test_var', 'test_value');"
    output:
      - create_request_result
    structured_output: true
    transition: invoke_get_request_script

  - id: invoke_get_request_script
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: get_request_script
    input:
      - request_path
      - script_type
    input_mapping:
      request_path:
        type: variable
        value: request_path
      script_type:
        type: variable
        value: script_type
    output:
      - tool_result
    structured_output: true
    transition: extract_request_id

  - id: extract_request_id
    type: code
    code:
      type: fstring
      value: |
        import json
        import re
        
        request_id = None
        create_str = elitea_state.get('create_request_result', '')
        
        # Try JSON parse first
        try:
            result_data = json.loads(create_str)
            if isinstance(result_data, dict):
                request_id = result_data.get('id') or result_data.get('uid')
        except:
            pass
        
        # Fallback: regex search
        if not request_id:
            id_match = re.search(r'"id"\s*:\s*"([^"]+)"', create_str)
            if id_match:
                request_id = id_match.group(1)
        
        request_id or "ID_NOT_FOUND"
    input:
      - create_request_result
    output:
      - request_id
    structured_output: true
    transition: cleanup_delete_request

  - id: cleanup_delete_request
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_request
    input:
      - request_id
    input_mapping:
      request_id:
        type: variable
        value: request_id
    output:
      - delete_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
      - delete_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'get_request_script' tool for pre-request scripts.
          
          Tool Result: {tool_result}
          Delete Result: {delete_result}
          
          This test validates that get_request_script retrieves pre-request script content from the default collection.
          
          Perform the following checks:
          1. Confirm the tool executed successfully.
          2. Verify the result contains pre-request script content or indicates no scripts.
          3. Check that pre-request script type is properly identified.
          4. Validate the response is appropriate for pre-request scripts.
          5. Confirm test request was deleted successfully.
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if ALL checks pass),
            "script_retrieved": boolean,
            "cleanup_succeeded": boolean,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
