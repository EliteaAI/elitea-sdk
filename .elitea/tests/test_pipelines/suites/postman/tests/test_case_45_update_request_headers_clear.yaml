name: "PST45 update request headers"
priority: High
description: |
  Validates that the update_request_headers tool properly handles clearing
  all request headers by passing empty array.
  
  Objective: Verify clearing request headers
  
  Expected Behavior:
  - Tool executes successfully
  - All request headers are cleared
  - Returns confirmation of the update
  - Request has no headers after operation

toolkits:
  - id: ${POSTMAN_TOOLKIT_ID}
    name: ${POSTMAN_TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  request_path:
    type: str
  headers:
    type: str
    value: "[]"
  folder_name:
    type: str
  request_name:
    type: str
  create_folder_result:
    type: str
  create_request_result:
    type: str
  delete_request_result:
    type: str
  delete_folder_result:
    type: str
entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        folder_name = f"PST_Folder_{timestamp}_{suffix}"
        request_name = f"PST_Request_{timestamp}_{suffix}"
        {
          "folder_name": folder_name,
          "request_name": request_name,
          "request_path": f"{folder_name}/{request_name}"
        }
    output:
      - folder_name
      - request_name
      - request_path
    structured_output: true
    transition: create_test_folder

  - id: create_test_folder
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_folder
    input:
      - folder_name
    input_mapping:
      name:
        type: variable
        value: folder_name
    output:
      - create_folder_result
    structured_output: true
    transition: create_test_request

  - id: create_test_request
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_request
    input:
      - folder_name
      - request_name
    input_mapping:
      folder_path:
        type: variable
        value: folder_name
      name:
        type: variable
        value: request_name
      method:
        type: fixed
        value: "GET"
      url:
        type: fixed
        value: "https://api.example.com/test"
    output:
      - create_request_result
    structured_output: true
    transition: invoke_update_request_headers

  - id: invoke_update_request_headers
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: update_request_headers
    input:
      - request_path
      - headers
    input_mapping:
      request_path:
        type: variable
        value: request_path
      headers:
        type: variable
        value: headers
    output:

      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'update_request_headers' tool when clearing headers.
          
          Tool Result: {tool_result}
          
          This test validates that update_request_headers clears all headers.
          
          Perform the following checks:
          1. Confirm the tool executed successfully.
          2. Verify the headers were cleared or set to empty.
          3. Check for success confirmation.
          4. Validate no errors occurred during the operation.
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if headers were cleared successfully),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: cleanup_request

  - id: cleanup_request
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_request
    input:
      - request_path
    input_mapping:
      request_path:
        type: variable
        value: request_path
    output:
      - delete_request_result
    structured_output: true
    transition: cleanup_folder

  - id: cleanup_folder
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_folder
    input:
      - folder_name
    input_mapping:
      folder_path:
        type: variable
        value: folder_name
    output:
      - delete_folder_result
    structured_output: true
    transition: END
