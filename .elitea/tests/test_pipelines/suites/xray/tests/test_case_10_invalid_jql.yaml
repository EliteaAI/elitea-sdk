name: "XR10 - get_tests: Handle invalid JQL syntax (Negative Test)"
description: |
  Verify the Xray 'get_tests' tool properly handles malformed JQL queries.

  Objective: Test error handling for invalid JQL syntax

  Expected Behavior (NEGATIVE TEST):
  - Tool returns error for malformed JQL
  - Error message indicates JQL parsing problem
  - Proper error handling without crashing
  - No test data is returned

toolkits:
  - id: ${XRAY_TOOLKIT_ID}
    name: ${XRAY_TOOLKIT_NAME}

state:
  project_key:
    type: str
    value: ${XRAY_PROJECT_KEY:EL}
  invalid_jql_query:
    type: str
    value: "project = AND testType INVALID SYNTAX ((("
  get_tests_result:
    type: str
  expected_error_indicators:
    type: list
    value: ["Unable to get tests", "error", "failed", "exception", "syntax", "parse"]
  unexpected_success_indicators:
    type: list
    value: ["Extracted tests", "total.*results", "issueId.*16"]
  get_tests_result_trimmed:
    type: str
  test_results:
    type: str

entry_point: get_tests_with_invalid_jql
nodes:
  - id: get_tests_with_invalid_jql
    type: toolkit
    input:
      - invalid_jql_query
    input_mapping:
      jql:
        type: variable
        value: invalid_jql_query
    output:
      - get_tests_result
    structured_output: false
    tool: get_tests
    toolkit_name: ${XRAY_TOOLKIT_NAME}
    continue_on_error: true
    transition: validate_error_handling

  - id: validate_error_handling
    type: code
    code:
      type: fixed
      value: |
        result_str = elitea_state.get("get_tests_result", "") or ""
        error_indicators = ["Unable to get tests", "error", "failed", "exception", "syntax", "parse", "Tool execution error"]
        success_indicators = ["Extracted tests"]

        has_error_message = len(result_str) > 10
        error_indicator_found = next((ind for ind in error_indicators if ind.lower() in result_str.lower()), "none")
        error_message_meaningful = error_indicator_found != "none"
        no_test_data = "Extracted tests" not in result_str and "issueId" not in result_str
        no_success_message = "Extracted tests" not in result_str

        test_passed = has_error_message and error_message_meaningful and no_test_data and no_success_message

        result_dict = {
            "test_passed": test_passed,
            "tool_executed": True,
            "has_error_message": has_error_message,
            "error_message_meaningful": error_message_meaningful,
            "no_test_data": no_test_data,
            "no_success_message": no_success_message,
            "error_indicator_found": error_indicator_found,
            "result_length": len(result_str),
            "result_preview": result_str[:150] if result_str else "EMPTY/NULL - ERROR HANDLING BROKEN",
            "error": None
        }

        {"test_results": result_dict}
    input:
      - get_tests_result
    output:
      - test_results
    structured_output: true
    transition: END
