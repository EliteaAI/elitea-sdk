name: "SPT03 - get_files_list: List root files"
priority: High
description: |
  Verify the SharePoint 'get_files_list' tool lists files in root document library
  for a /teams/ site using site_path.

  Feature: Issue #2584 - Add Support for Additional SharePoint Spaces
  Tags: feature:2584

  Expected Behavior:
  - Tool executes successfully on teams site via site_path
  - Returns array of file objects from Shared Documents root
  - Each file contains Name, Path, Created, Modified, Link fields
  - Paths contain /teams/ prefix (not /sites/)

toolkits:
  - id: ${SHAREPOINT_TEAMS_TOOLKIT_ID}
    name: ${SHAREPOINT_TEAMS_TOOLKIT_NAME}

state:
  folder_name:
    type: str
    value: ""
  limit_files:
    type: int
    value: 50
  files_result:
    type: dict
  expected_fields:
    type: list
    value: ["Name", "Path", "Created", "Modified", "Link"]
  error_indicators:
    type: list
    value: ["error", "failed", "exception", "denied", "401", "403"]
  test_results:
    type: dict

entry_point: invoke_get_files_list

nodes:
  - id: invoke_get_files_list
    type: toolkit
    tool: get_files_list
    toolkit_name: ${SHAREPOINT_TEAMS_TOOLKIT_NAME}
    input:
      - folder_name
      - limit_files
    input_mapping:
      folder_name:
        type: variable
        value: folder_name
      limit_files:
        type: variable
        value: limit_files
    output:
      - files_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: ${DEFAULT_LLM_MODEL}
    input:
      - files_result
      - limit_files
      - expected_fields
      - error_indicators
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the 'get_files_list' output for a SharePoint /teams/ site root.

          Tool executed: get_files_list
          Folder: root (empty string)
          Limit: {limit_files}
          Results: {files_result}
          Expected fields: {expected_fields}
          Error indicators: {error_indicators}

          STRICT VALIDATION RULES (all must pass):
          1. Tool executed successfully without errors
          2. Result is a valid JSON array (not null, not empty string)
          3. No error indicators present in the result
          4. Array is NOT EMPTY - must contain at least 1 file or folder
             (test data: DO_NOT_DELETE_TeamsTestFiles folder should be visible)
          5. Each item MUST have ALL these fields: Name, Path, Created, Modified, Link
          6. All paths MUST contain '/teams/' substring (not '/sites/')
          7. Name field must be non-empty string for each item
          8. Number of items does not exceed limit ({limit_files})

          TEST FAILS if:
          - Result is empty array [] (missing test data in Shared Documents root)
          - Result contains error indicators
          - Any item missing required fields (Name, Path, Created, Modified, Link)
          - Paths don't contain '/teams/'

          Return a JSON object with:
          {{
            "test_passed": true/false,
            "summary": "brief description of outcome",
            "items_count": <number of items returned>,
            "error": "error details if failed, null if passed"
          }}

          Return **only** the JSON object. No markdown formatting.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
