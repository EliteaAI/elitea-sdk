name: "ISP02-filtered"
priority: High
description: |
  Verify index_data indexes SharePoint files with extension filtering and custom chunking config.

  Tests:
  1. Index all files except png (skip_extensions)
  2. Apply chunking config {"max_tokens": 256} for .txt files
  3. Search index to verify all documents are present
  4. Verify text_large.txt has exactly 4 chunks using filter

  Objective: Confirm skip_extensions and chunking_config parameters work correctly
  and that indexed documents are searchable with proper chunking applied.

  Expected Behavior:
  - Index completes successfully (status: ok)
  - Search returns indexed documents
  - text_large.txt filter search returns exactly 4 chunks
  - png files are not indexed

toolkits:
  - id: ${ISP_TOOLKIT_ID}
    name: ${ISP_TOOLKIT_NAME}

state:
  skip_extensions:
    type: list
    value: ["png"]
  chunking_config:
    type: dict
    value:
      ".txt":
        max_tokens: 256
  index_result:
    type: dict
  search_all_result:
    type: dict
  search_large_txt_result:
    type: dict
  search_stats:
    type: dict
  test_results:
    type: dict

entry_point: invoke_index_data

nodes:
  - id: invoke_index_data
    type: toolkit
    tool: index_data
    toolkit_name: ${ISP_TOOLKIT_NAME}
    input:
      - skip_extensions
      - chunking_config
    input_mapping:
      index_name:
        type: fixed
        value: "idx02"
      clean_index:
        type: fixed
        value: true
      path:
        type: fixed
        value: "${TEST_SUBFOLDER}"
      limit_files:
        type: fixed
        value: 100
      skip_extensions:
        type: variable
        value: skip_extensions
      chunking_config:
        type: variable
        value: chunking_config
    output:
      - index_result
    structured_output: true
    transition: search_all_docs

  - id: search_all_docs
    type: toolkit
    tool: search_index
    toolkit_name: ${ISP_TOOLKIT_NAME}
    input: []
    input_mapping:
      query:
        type: fixed
        value: "document"
      index_name:
        type: fixed
        value: "idx02"
      search_top:
        type: fixed
        value: 50
    output:
      - search_all_result
    structured_output: true
    transition: search_text_large

  - id: search_text_large
    type: toolkit
    tool: search_index
    toolkit_name: ${ISP_TOOLKIT_NAME}
    input: []
    input_mapping:
      query:
        type: fixed
        value: "text content"
      index_name:
        type: fixed
        value: "idx02"
      filter:
        type: fixed
        value:
          Name: "text_large.txt"
      search_top:
        type: fixed
        value: 50
    output:
      - search_large_txt_result
    structured_output: true
    transition: compute_search_stats

  - id: compute_search_stats
    type: code
    input:
      - search_all_result
      - search_large_txt_result
    code:
      type: fstring
      value: |
        import json

        raw_large = elitea_state.get('search_large_txt_result', [])
        large_txt_items = raw_large if isinstance(raw_large, list) else []
        large_txt_chunk_count = len(large_txt_items)
        all_large_txt = all(
            item.get("metadata", {}).get("Name") == "text_large.txt"
            for item in large_txt_items
        ) if large_txt_items else False

        raw_all = elitea_state.get('search_all_result', [])
        all_docs = raw_all if isinstance(raw_all, list) else []
        png_files_found = [
            item.get("metadata", {}).get("Name", "")
            for item in all_docs
            if item.get("metadata", {}).get("Name", "").lower().endswith(".png")
        ]
        search_all_non_empty = len(all_docs) > 0

        {
          "large_txt_chunk_count": large_txt_chunk_count,
          "large_txt_chunks_all_correct_file": all_large_txt,
          "search_all_non_empty": search_all_non_empty,
          "png_files_found": png_files_found,
          "png_files_present": len(png_files_found) > 0
        }
    output:
      - search_stats
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - index_result
      - search_stats
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the indexing and search statistics for SharePoint documents.

          Index Result: {index_result}
          Search Statistics (pre-computed): {search_stats}

          The search_stats object contains:
          - large_txt_chunk_count: number of chunks returned for text_large.txt (must be exactly 4)
          - large_txt_chunks_all_correct_file: true if all filtered results are for text_large.txt
          - search_all_non_empty: true if general search returned results
          - png_files_found: list of any .png file names found in general search (must be empty)
          - png_files_present: true if any .png files were found (must be false)

          Note: search_all_result is a general search across ALL indexed documents and is expected
          to contain multiple document types (docx, pdf, txt). This is correct behavior.

          Validation rules:
          1. index_result must have "status": "ok"
          2. index_result message must indicate successful indexing
          3. search_all_non_empty must be true
          4. large_txt_chunk_count must be exactly 4
          5. large_txt_chunks_all_correct_file must be true
          6. png_files_present must be false (no png files indexed)
          7. All validations must pass for test to pass

          Return a json object with:
          {{
            "test_passed": true/false,
            "summary": "brief description including chunk count for text_large.txt",
            "error": "error details if failed, null if passed"
          }}

          Return **only** the json object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
