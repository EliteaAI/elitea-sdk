name: "ISP02-filtered"
priority: High
description: |
  Verify index_data indexes SharePoint files with extension filtering and custom chunking config.

  Tests:
  1. Index all files except png (skip_extensions)
  2. Apply chunking config {"max_tokens": 256} for .txt files
  3. Search index to verify all documents are present
  4. Verify text_large.txt has exactly 4 chunks using filter

  Objective: Confirm skip_extensions and chunking_config parameters work correctly
  and that indexed documents are searchable with proper chunking applied.

  Expected Behavior:
  - Index completes successfully (status: ok)
  - Search returns indexed documents
  - text_large.txt filter search returns exactly 4 chunks
  - png files are not indexed

toolkits:
  - id: ${ISP_TOOLKIT_ID}
    name: ${ISP_TOOLKIT_NAME}

state:
  skip_extensions:
    type: list
    value: ["png"]
  chunking_config:
    type: dict
    value:
      ".txt":
        max_tokens: 256
  index_result:
    type: dict
  search_all_result:
    type: dict
  search_large_txt_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_index_data

nodes:
  - id: invoke_index_data
    type: toolkit
    tool: index_data
    toolkit_name: ${ISP_TOOLKIT_NAME}
    input:
      - skip_extensions
      - chunking_config
    input_mapping:
      index_name:
        type: fixed
        value: "idx02"
      clean_index:
        type: fixed
        value: true
      path:
        type: fixed
        value: "${TEST_SUBFOLDER}"
      limit_files:
        type: fixed
        value: 100
      skip_extensions:
        type: variable
        value: skip_extensions
      chunking_config:
        type: variable
        value: chunking_config
    output:
      - index_result
    structured_output: true
    transition: search_all_docs

  - id: search_all_docs
    type: toolkit
    tool: search_index
    toolkit_name: ${ISP_TOOLKIT_NAME}
    input: []
    input_mapping:
      query:
        type: fixed
        value: "document"
      index_name:
        type: fixed
        value: "idx02"
      search_top:
        type: fixed
        value: 50
    output:
      - search_all_result
    structured_output: true
    transition: search_text_large

  - id: search_text_large
    type: toolkit
    tool: search_index
    toolkit_name: ${ISP_TOOLKIT_NAME}
    input: []
    input_mapping:
      query:
        type: fixed
        value: "text content"
      index_name:
        type: fixed
        value: "idx02"
      filter:
        type: fixed
        value:
          Name: "text_large.txt"
      search_top:
        type: fixed
        value: 50
    output:
      - search_large_txt_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - index_result
      - search_all_result
      - search_large_txt_result
      - skip_extensions
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator. Output ONLY valid JSON."
      task:
        type: fstring
        value: |
          Validate SharePoint indexing and search results.

          ## Data to Validate

          Index Result: {index_result}
          Search All Docs: {search_all_result}
          Search text_large.txt (filtered): {search_large_txt_result}
          Skip Extensions: {skip_extensions}

          ## Chunk Structure Reference

          Each chunk in search results is a JSON object with this structure:
          ```
          {{
            "page_content": "...",
            "metadata": {{
              "chunk_id": "...",
              "Name": "text_large.txt",
              ...
            }}
          }}
          ```

          The search_large_txt_result is an ARRAY of such chunk objects.

          ## Counting Instructions

          To count chunks in search_large_txt_result:
          1. Parse search_large_txt_result as a JSON array
          2. Count the number of top-level objects in the array
          3. Each object with "page_content" and "metadata" is ONE chunk
          4. Do NOT count nested fields or metadata properties as separate chunks

          ## Validation Rules

          1. index_result must have "status": "ok"
          2. search_all_result must be non-empty
          3. search_large_txt_result must contain EXACTLY 4 chunk objects
          4. Every chunk in search_large_txt_result must have metadata.Name == "text_large.txt"
          5. No .png files in search_all_result (check metadata.Name field)

          ## Output

          Return ONLY this JSON (no markdown):
          {{
            "test_passed": true/false,
            "summary": "description with actual chunk count",
            "error": "error details if failed, null if passed"
          }}
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
