state:
  all_files:
    type: list
    value: []
  bucket_name:
    type: str
    value: ''
  changed_files:
    type: list
    value: []
  changes_filename:
    type: str
    value: ''
  current_archive_index:
    type: int
    value: 0
  current_deletion_index:
    type: int
    value: 0
  current_diff_index:
    type: int
    value: 0
  current_file_path:
    type: str
    value: ''
  current_retrieval_date:
    type: str
    value: ''
  current_snapshot:
    type: dict
    value: {}
  current_version_index:
    type: int
    value: 0
  debug_info:
    type: dict
    value: {}
  debug_info_1:
    type: dict
    value: {}
  debug_info_2:
    type: dict
    value: {}
  downloaded_content:
    type: str
    value: ''
  error_message:
    type: str
    value: ''
  files_to_archive:
    type: list
    value: []
  files_to_delete:
    type: list
    value: []
  files_to_diff:
    type: list
    value: []
  files_to_version:
    type: list
    value: []
  folder_path:
    type: str
    value: ''
  found_folders:
    type: list
    value: []
  input:
    type: str
  input_bucket_name:
    type: str
    value: ''
  input_folder_path:
    type: str
    value: ''
  input_id:
    type: str
    value: ''
  search_base_path:
    type: str
    value: ''
  is_first_run:
    type: bool
    value: false
  last_retrieval_date:
    type: str
    value: ''
  messages:
    type: list
  new_files:
    type: list
    value: []
  previous_snapshot:
    type: dict
    value: {}
  removed_files:
    type: list
    value: []
  unchanged_count:
    type: int
    value: 0
  validation_passed:
    type: bool
    value: false
entry_point: ParseInput
nodes:
  - id: ParseInput
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        from datetime import datetime

        input_str = alita_state.get('input', '').strip()

        if not input_str:
            result = {
                "validation_passed": False,
                "error_message": "Input required. Provide JSON with 'id':\n{\"id\": \"12345\", \"folder_path\": \"optional-search-base\", \"bucket_name\": \"optional-bucket\"}",
                "folder_path": "",
                "input_bucket_name": "",
                "input_id": "",
                "input_folder_path": "",
                "search_base_path": "",
                "current_retrieval_date": datetime.now().isoformat()
            }
        else:
            parse_failed = False
            try:
                input_data = json.loads(input_str)
            except json.JSONDecodeError:
                # Try to fix Python-style booleans
                fixed = re.sub(r':\s*True\b', ': true', input_str)
                fixed = re.sub(r':\s*False\b', ': false', fixed)
                try:
                    input_data = json.loads(fixed)
                except json.JSONDecodeError:
                    parse_failed = True
                    result = {
                        "validation_passed": False,
                        "error_message": f"Invalid JSON. Expected: {{\"id\": \"12345\"}}\nReceived: \"{input_str}\"",
                        "folder_path": "",
                        "input_bucket_name": "",
                        "input_id": "",
                        "input_folder_path": "",
                        "search_base_path": "",
                        "current_retrieval_date": datetime.now().isoformat()
                    }

            if not parse_failed:
                if not isinstance(input_data, dict):
                    result = {
                        "validation_passed": False,
                        "error_message": "Input must be a JSON object.",
                        "folder_path": "",
                        "input_bucket_name": "",
                        "input_id": "",
                        "input_folder_path": "",
                        "search_base_path": "",
                        "current_retrieval_date": datetime.now().isoformat()
                    }
                elif 'id' not in input_data:
                    result = {
                        "validation_passed": False,
                        "error_message": "Field 'id' is required. Provide: {\"id\": \"12345\", \"folder_path\": \"optional\", \"bucket_name\": \"optional\"}",
                        "folder_path": "",
                        "input_bucket_name": "",
                        "input_id": "",
                        "input_folder_path": "",
                        "search_base_path": "",
                        "current_retrieval_date": datetime.now().isoformat()
                    }
                else:
                    feature_id = str(input_data['id']).strip()
                    if not feature_id:
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'id' cannot be empty.",
                            "folder_path": "",
                            "input_bucket_name": "",
                            "input_id": "",
                            "input_folder_path": "",
                            "search_base_path": "",
                            "current_retrieval_date": datetime.now().isoformat()
                        }
                    else:
                        # Get optional parameters with defaults
                        search_base = input_data.get('folder_path', 'Shared Documents/General')
                        bucket = input_data.get('bucket_name', f'feature-{feature_id}')
                        result = {
                            "validation_passed": True,
                            "error_message": "",
                            "folder_path": "",  # Will be set after finding the folder
                            "input_bucket_name": bucket,
                            "input_id": feature_id,
                            "input_folder_path": search_base,
                            "search_base_path": search_base,
                            "current_retrieval_date": datetime.now().isoformat()
                        }

        result
    input: []
    output:
      - input_bucket_name
      - input_id
      - input_folder_path
      - search_base_path
      - folder_path
    structured_output: true
    transition: ValidationRouter
  - id: ValidationRouter
    type: router
    condition: |
      {% if validation_passed %}
        FindFeatureFolder
      {% else %}
        FormatError
      {% endif %}
    default_output: FormatError
    input:
      - validation_passed
    routes:
      - FormatError
      - FindFeatureFolder
  - id: FindFeatureFolder
    type: code
    code:
      type: fixed
      value: |-
        # Prepare to search for folder containing the feature ID in its name
        input_id = alita_state.get('input_id', '').strip()
        search_base_path = alita_state.get('search_base_path', '').strip()
        
        # Just pass through - actual search happens in SearchFolders toolkit node
        result = {
            "found_folders": []
        }
        
        result
    input:
      - input_id
      - search_base_path
    output:
      - found_folders
    structured_output: true
    transition: SearchFolders
  - id: SearchFolders
    type: toolkit
    input:
      - search_base_path
    input_mapping:
      folder_name:
        type: variable
        value: search_base_path
      form_name:
        type: fixed
        value: null
      include_extensions:
        type: fixed
        value: null
      limit_files:
        type: fixed
        value: 10000
      skip_extensions:
        type: fixed
        value: null
    output:
      - all_files
    structured_output: true
    tool: get_files_list
    toolkit_name: LFAInternalSharePoint
    transition: FilterFoldersByID
  - id: FilterFoldersByID
    type: code
    code:
      type: fixed
      value: |-
        import re
        import json
        import ast
        
        # ── Recover state if it arrived as a string (datetime serialization bug) ──
        state = alita_state
        if isinstance(state, str):
            # Replace datetime.datetime(...) with ISO strings
            fixed = re.sub(
                r'datetime\.datetime\((\d+),\s*(\d+),\s*(\d+)(?:,\s*(\d+))?(?:,\s*(\d+))?(?:,\s*(\d+))?\)',
                lambda m: "'{}-{}-{}T{}:{}:{}'".format(
                    m.group(1).zfill(4), m.group(2).zfill(2), m.group(3).zfill(2),
                    (m.group(4) or '0').zfill(2), (m.group(5) or '0').zfill(2), (m.group(6) or '0').zfill(2)
                ),
                state
            )
            try:
                state = ast.literal_eval(fixed)
            except Exception:
                try:
                    state = json.loads(state)
                except Exception:
                    state = {}
        
        input_id = state.get('input_id', '').strip() if isinstance(state, dict) else ''
        all_files_raw = state.get('all_files', []) if isinstance(state, dict) else []
        
        # Capture debug info about what we received
        debug_info_1 = {
            'state_type': type(alita_state).__name__,
            'state_recovery_used': isinstance(alita_state, str),
            'raw_type': type(all_files_raw).__name__,
            'raw_is_str': isinstance(all_files_raw, str),
            'raw_is_list': isinstance(all_files_raw, list),
            'raw_preview': str(all_files_raw)[:500] if all_files_raw else 'None/Empty'
        }
        
        all_files = all_files_raw
        
        # Parse all_files if it's a JSON string
        if isinstance(all_files, str):
            debug_info_1['parse_attempted'] = True
            try:
                all_files = json.loads(all_files)
                debug_info_1['parse_success'] = True
                debug_info_1['parsed_type'] = type(all_files).__name__
            except (json.JSONDecodeError, ValueError) as e:
                debug_info_1['parse_success'] = False
                debug_info_1['parse_error'] = str(e)
                all_files = []
        else:
            debug_info_1['parse_attempted'] = False
        
        # Ensure all_files is a list
        if not isinstance(all_files, list):
            debug_info_1['converted_to_list'] = True
            all_files = []
        else:
            debug_info_1['is_valid_list'] = True
            debug_info_1['list_length'] = len(all_files)
            if all_files:
                debug_info_1['first_item_type'] = type(all_files[0]).__name__
                debug_info_1['first_item_preview'] = str(all_files[0])[:200]
        
        # Extract first-level subfolders that contain the ID
        # Only look at direct children of search_base_path, not nested subfolders
        search_base_path = state.get('search_base_path', '').strip() if isinstance(state, dict) else ''
        base_depth = len([p for p in search_base_path.split('/') if p])  # Count path segments
        
        found_folders = []
        found_folder_paths = set()  # Track unique folders
        item_types_seen = []
        
        debug_info_1['search_base_path'] = search_base_path
        debug_info_1['base_depth'] = base_depth
        
        for idx, item in enumerate(all_files):
            item_type = type(item).__name__
            if idx < 3:  # Track first 3 item types
                item_types_seen.append({'index': idx, 'type': item_type, 'preview': str(item)[:100]})
            
            # Skip non-dict items
            if not isinstance(item, dict):
                continue
            
            # Try to extract first-level folder from file path
            try:
                item_path = item.get('Path', '') or item.get('ServerRelativeUrl', '')
                
                if not item_path or not item_path.startswith(search_base_path):
                    continue
                
                # Get the relative path after the base
                relative_path = item_path[len(search_base_path):].lstrip('/')
                path_parts = [p for p in relative_path.split('/') if p]
                
                # Only look at first segment (direct subfolder)
                if len(path_parts) > 0:
                    first_folder = path_parts[0]
                    
                    # Check if this first-level folder contains the ID
                    if input_id.lower() in first_folder.lower():
                        folder_path = f"{search_base_path}/{first_folder}"
                        
                        # Only add if not already tracked
                        if folder_path not in found_folder_paths:
                            found_folder_paths.add(folder_path)
                            found_folders.append({
                                'Name': first_folder,
                                'Path': folder_path,
                                'Modified': item.get('Modified', ''),
                                'Created': item.get('Created', ''),
                                'Link': '',
                                'id': ''
                            })
                
            except Exception as e:
                debug_info_1['item_error'] = {'index': idx, 'error': str(e), 'item_type': item_type}
        
        debug_info_1['found_folders_count'] = len(found_folders)
        debug_info_1['item_types_seen'] = item_types_seen
        
        result = {
            'found_folders': found_folders,
            'debug_info_1': debug_info_1
        }
        result
    input:
      - input_id
      - all_files
      - search_base_path
    output:
      - found_folders
      - debug_info_1
    structured_output: true
    transition: ValidateFolderSearch
  - id: ValidateFolderSearch
    type: router
    condition: |
      {% if found_folders|length == 0 %}
        FolderSearchError
      {% elif found_folders|length > 1 %}
        FolderSearchError
      {% else %}
        UpdateFolderPath
      {% endif %}
    default_output: FolderSearchError
    input:
      - found_folders
    routes:
      - FolderSearchError
      - UpdateFolderPath
  - id: FolderSearchError
    type: code
    code:
      type: fixed
      value: |-
        input_id = alita_state.get('input_id', '')
        search_base_path = alita_state.get('search_base_path', '')
        found_folders = alita_state.get('found_folders', [])
        
        if len(found_folders) == 0:
            error_message = f"No folder found containing ID '{input_id}' in base path '{search_base_path}'."
        elif len(found_folders) > 1:
            folder_names = [f['Name'] for f in found_folders]
            error_message = f"Multiple folders found containing ID '{input_id}' in base path '{search_base_path}':\n" + "\n".join([f"  - {name}" for name in folder_names]) + "\n\nPlease provide a more specific ID or use direct folder_path."
        else:
            error_message = f"Internal error in folder search validation."
        
        report = f"❌ Failed to locate unique feature folder.\n\n**Error:** {error_message}\n\nPlease check the input and try again."
        
        msgs = list(alita_state.get('messages', []))
        msgs.append({"role": "assistant", "content": report})
        result = {"messages": msgs}
        result
    input:
      - input_id
      - search_base_path
      - found_folders
    output:
      - messages
    structured_output: true
    transition: END
  - id: UpdateFolderPath
    type: code
    code:
      type: fixed
      value: |-
        # Extract the path from the single found folder
        found_folders = alita_state.get('found_folders', [])
        
        if len(found_folders) == 1:
            folder = found_folders[0]
            folder_path = folder.get('Path', '')
            result = {
                'folder_path': folder_path
            }
        else:
            # Should not reach here due to router validation, but defensive
            result = {
                'folder_path': ''
            }
        
        result
    input:
      - found_folders
    output:
      - folder_path
    structured_output: true
    transition: LoadState
  - id: FormatError
    type: code
    code:
      type: fixed
      value: |-
        error_message = alita_state.get('error_message', '')

        report = f"❌ Failed to process request.\n\n**Error:** {error_message}\n\nPlease check the input and try again."

        msgs = list(alita_state.get('messages', []))
        msgs.append({"role": "assistant", "content": report})
        result = {"messages": msgs}
        result
    input:
      - error_message
    output:
      - messages
    structured_output: true
    transition: END
  - id: LoadState
    type: code
    code:
      type: fixed
      value: |-
        import json

        # Use input bucket_name if provided, otherwise use default from state
        input_bucket_name = alita_state.get('input_bucket_name', '').strip()
        default_bucket_name = alita_state.get('bucket_name')
        bucket_name = input_bucket_name if input_bucket_name else default_bucket_name

        store = alita_client.artifact(bucket_name)

        # Load retrieval log
        is_first_run = False
        last_retrieval_date = '1900-01-01T00:00:00'
        log_raw = store.get('retrieval_log.txt')
        
        if log_raw and not any(err in str(log_raw).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
            lines = str(log_raw).strip().split('\n')
            if lines:
                last_retrieval_date = lines[-1].strip()
        else:
            is_first_run = True

        # Load snapshot
        previous_snapshot = {}
        snap_raw = store.get('snapshot.json')
        if snap_raw and not any(err in str(snap_raw).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
            try:
                previous_snapshot = json.loads(str(snap_raw))
            except json.JSONDecodeError:
                pass

        {
            'bucket_name': bucket_name,
            'last_retrieval_date': last_retrieval_date,
            'is_first_run': is_first_run,
            'previous_snapshot': previous_snapshot
        }
    input:
      - input_bucket_name
    output:
      - bucket_name
      - last_retrieval_date
      - is_first_run
      - previous_snapshot
    structured_output: true
    transition: GetFilesFromSharepoint
  - id: GetFilesFromSharepoint
    type: toolkit
    input:
      - folder_path
    input_mapping:
      folder_name:
        type: variable
        value: folder_path
      form_name:
        type: fixed
        value: null
      include_extensions:
        type: fixed
        value: null
      limit_files:
        type: fixed
        value: 10000
      skip_extensions:
        type: fixed
        value: null
    output:
      - all_files
    structured_output: true
    tool: get_files_list
    toolkit_name: LFAInternalSharePoint
    transition: NormalizeFiles
  - id: NormalizeFiles
    type: code
    code:
      type: fixed
      value: |-
        import re
        import ast
        import json
        from datetime import datetime

        debug_info = {
            'alita_state_type': type(alita_state).__name__,
            'recovery_used': False
        }

        # ── Recover state if it arrived as a string ──
        # This happens when object_to_dict lets datetime objects through,
        # safe_serialize falls back to json.dumps(str(state)),
        # and json.loads returns a str instead of a dict.
        state = alita_state
        if isinstance(state, str):
            debug_info['recovery_used'] = True
            debug_info['raw_state_preview'] = state[:500]
            # Replace datetime.datetime(...) with ISO strings
            fixed = re.sub(
                r'datetime\.datetime\((\d+),\s*(\d+),\s*(\d+)(?:,\s*(\d+))?(?:,\s*(\d+))?(?:,\s*(\d+))?\)',
                lambda m: "'{}-{}-{}T{}:{}:{}'".format(
                    m.group(1).zfill(4), m.group(2).zfill(2), m.group(3).zfill(2),
                    (m.group(4) or '0').zfill(2), (m.group(5) or '0').zfill(2), (m.group(6) or '0').zfill(2)
                ),
                state
            )
            debug_info['datetime_replacements'] = len(re.findall(r'datetime\.datetime\(', state))
            try:
                state = ast.literal_eval(fixed)
                debug_info['recovery_method'] = 'ast.literal_eval'
            except Exception as e:
                debug_info['recovery_error'] = str(e)
                debug_info['fixed_preview'] = fixed[:500]
                # Last resort: try json.loads in case it's valid JSON
                try:
                    state = json.loads(state)
                    debug_info['recovery_method'] = 'json.loads_raw'
                except Exception:
                    state = {}
                    debug_info['recovery_method'] = 'failed'

        # ── Normalize files ──
        all_files = state.get('all_files', []) if isinstance(state, dict) else []

        # If all_files is a JSON string, parse it
        if isinstance(all_files, str):
            debug_info['all_files_was_string'] = True
            try:
                all_files = json.loads(all_files)
            except Exception:
                all_files = []

        converted_count = 0
        normalized = []
        for file in (all_files if isinstance(all_files, list) else []):
            if not isinstance(file, dict):
                normalized.append(file)
                continue
            norm_file = {}
            for key, val in file.items():
                if isinstance(val, datetime):
                    norm_file[key] = val.isoformat()
                    converted_count += 1
                else:
                    norm_file[key] = val
            normalized.append(norm_file)

        debug_info['files_count'] = len(normalized)
        debug_info['datetime_fields_converted'] = converted_count
        if normalized:
            debug_info['sample_file'] = str(normalized[0])[:300]

        result = {
            'all_files': normalized,
            'debug_info': debug_info
        }
        result
    input:
      - all_files
    output:
      - all_files
      - debug_info
    structured_output: true
    transition: CompareSnapshots
  - id: CompareSnapshots
    type: code
    code:
      type: fixed
      value: |-
        from datetime import datetime

        all_files = alita_state.get('all_files', [])
        previous_snapshot = alita_state.get('previous_snapshot', {})
        last_retrieval_date = alita_state.get('last_retrieval_date', '')

        # Create current snapshot: {path: {metadata}}
        # Try multiple possible path field names
        current_snapshot = {}
        for file in all_files:
            if isinstance(file, dict):
                # Try different possible path field names
                path = (file.get('Path', '') or 
                       file.get('ServerRelativeUrl', '') or
                       file.get('FileRef', '') or
                       file.get('FileSystemObjectType', '') or
                       file.get('Url', ''))
                
                if path:
                    current_snapshot[path] = {
                        'Name': file.get('Name', ''),
                        'Modified': file.get('Modified', ''),
                        'Created': file.get('Created', ''),
                        'Link': file.get('Link', ''),
                        'id': file.get('id', '')
                    }

        # Parse last retrieval date
        try:
            last_date = datetime.fromisoformat(last_retrieval_date.replace('Z', ''))
        except:
            last_date = datetime(1900, 1, 1)

        # Identify changes
        new_files = []
        removed_files = []
        changed_files = []
        unchanged_count = 0

        current_paths = set(current_snapshot.keys())
        previous_paths = set(previous_snapshot.keys())

        # New files
        for path in current_paths - previous_paths:
            new_files.append({
                'Path': path,
                **current_snapshot[path]
            })

        # Removed files
        for path in previous_paths - current_paths:
            removed_files.append({
                'Path': path,
                **previous_snapshot[path]
            })

        # Changed or unchanged files
        for path in current_paths & previous_paths:
            current_modified = current_snapshot[path].get('Modified', '')
            previous_modified = previous_snapshot[path].get('Modified', '')
            
            # Compare modification dates
            if current_modified != previous_modified:
                # File was modified
                try:
                    current_mod_dt = datetime.fromisoformat(current_modified.replace('Z', '').split('+')[0].split('.')[0])
                    if current_mod_dt > last_date:
                        changed_files.append({
                            'Path': path,
                            'PreviousModified': previous_modified,
                            'CurrentModified': current_modified,
                            **current_snapshot[path]
                        })
                    else:
                        unchanged_count += 1
                except:
                    unchanged_count += 1
            else:
                unchanged_count += 1

        {
            'current_snapshot': current_snapshot,
            'new_files': new_files,
            'removed_files': removed_files,
            'changed_files': changed_files,
            'unchanged_count': unchanged_count
        }
    input:
      - all_files
      - previous_snapshot
      - last_retrieval_date
    output:
      - current_snapshot
      - new_files
      - removed_files
      - changed_files
      - unchanged_count
    structured_output: true
    transition: SaveState
  - id: SaveState
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        from datetime import datetime

        bucket_name = alita_state.get('bucket_name')
        store = alita_client.artifact(bucket_name)

        current_retrieval_date_raw = alita_state.get('current_retrieval_date', '')
        last_retrieval_date = alita_state.get('last_retrieval_date', '')
        current_snapshot = alita_state.get('current_snapshot', {})
        new_files = alita_state.get('new_files', [])
        removed_files = alita_state.get('removed_files', [])
        changed_files = alita_state.get('changed_files', [])

        # Truncate microseconds from current_retrieval_date for consistency
        # This ensures retrieval_log timestamps match changes_*.json filenames
        dt = datetime.fromisoformat(current_retrieval_date_raw.replace('Z', ''))
        current_retrieval_date = dt.strftime('%Y-%m-%dT%H:%M:%S')

        # 1. Load existing retrieval log to track removals
        old_log_lines = []
        log_raw = store.get('retrieval_log.txt')
        if log_raw and not any(err in str(log_raw).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
            old_log_lines = [line.strip() for line in str(log_raw).strip().split('\n') if line.strip()]

        # 2. Build new log (keep last 5 entries)
        # Start with all existing log lines, append new date, then keep last 5
        log_lines = old_log_lines.copy()
        log_lines.append(current_retrieval_date)
        log_lines = log_lines[-5:]

        # 3. Identify dates being removed (dates in old_log but not in new log)
        dates_to_remove = set(old_log_lines) - set(log_lines)

        # 4. Delete corresponding changes_*.json files for removed dates
        for removed_date in dates_to_remove:
            # Parse ISO date and convert to changes_*.json filename format
            dt_removed = datetime.fromisoformat(removed_date.replace('Z', ''))
            changes_filename_to_delete = f"changes_{dt_removed.strftime('%Y%m%d_%H%M%S')}.json"
            
            # Delete the file (check_exists=False for idempotent S3-style delete)
            # Note: delete() may return JsNull which causes errors when accessing, but deletion succeeds
            try:
                store.delete(changes_filename_to_delete, check_exists=False)
                # If we get here without exception, file was deleted successfully
                # Don't try to access the result object - it may be JsNull
            except Exception as e:
                # Only log if actual deletion failed (not result parsing)
                if 'getReader' not in str(e):  # Skip JsNull result parsing errors
                    error_log = f"[DELETION FAILED]\nTarget: {changes_filename_to_delete}\nTimestamp: {removed_date}\nError: {str(e)}\nCurrent time: {current_retrieval_date}"
                    try:
                        store.create(f"error_deletion_{dt_removed.strftime('%Y%m%d_%H%M%S')}.txt", error_log)
                    except:
                        pass

        # 5. Save updated retrieval log
        r = store.create('retrieval_log.txt', '\n'.join(log_lines))

        # 6. Save snapshot
        r = store.create('snapshot.json', json.dumps(current_snapshot, indent=2, ensure_ascii=False))

        # 7. Enhance file entries with artifact storage filenames
        def add_artifact_filenames(files, file_type):
            enhanced_files = []
            for file in files:
                file_id = file.get('id', '')
                file_name = file.get('Name', '')
                enhanced_file = dict(file)
                
                if file_id and file_name:
                    # Sanitize: spaces to hyphens, special chars to underscores
                    safe_name = re.sub(r'[^\w\-]', '_', file_name.replace(' ', '-'))
                    enhanced_file['artifact_storage'] = {
                        'current': f"file_{file_id}_{safe_name}.txt"
                    }
                    
                    if file_type == 'changed':
                        enhanced_file['artifact_storage']['previous'] = f"file_prev_{file_id}_{safe_name}.txt"
                        enhanced_file['artifact_storage']['diff'] = f"file_diff_{file_id}_{safe_name}.txt"
                    elif file_type == 'removed':
                        enhanced_file['artifact_storage']['deleted'] = f"file_del_{file_id}_{safe_name}.txt"
                
                enhanced_files.append(enhanced_file)
            return enhanced_files

        enhanced_new_files = add_artifact_filenames(new_files, 'new')
        enhanced_removed_files = add_artifact_filenames(removed_files, 'removed')
        enhanced_changed_files = add_artifact_filenames(changed_files, 'changed')

        # 8. Save changes report with artifact filenames
        # Use truncated timestamp (already parsed from current_retrieval_date) to match retrieval_log
        timestamp = dt.strftime('%Y%m%d_%H%M%S')
        changes_filename = f"changes_{timestamp}.json"
        changes_data = {
            'retrieval_date': current_retrieval_date,
            'summary': {
                'new_files_count': len(new_files),
                'removed_files_count': len(removed_files),
                'changed_files_count': len(changed_files)
            },
            'new_files': enhanced_new_files,
            'removed_files': enhanced_removed_files,
            'changed_files': enhanced_changed_files
        }
        r = store.create(changes_filename, json.dumps(changes_data, indent=2, ensure_ascii=False))

        {'changes_filename': changes_filename}
    input:
      - bucket_name
      - current_retrieval_date
      - last_retrieval_date
      - current_snapshot
      - new_files
      - removed_files
      - changed_files
    output:
      - changes_filename
    structured_output: true
    transition: PrepareVersioning
  - id: PrepareVersioning
    type: code
    code:
      type: fixed
      value: |-
        import re

        changed_files = alita_state.get('changed_files', [])
        removed_files = alita_state.get('removed_files', [])
        new_files = alita_state.get('new_files', [])

        # Prepare list of changed files that need previous version saved
        files_to_version = []

        for file in changed_files:
            file_id = file.get('id', '')
            file_name = file.get('Name', '')
            
            if file_id and file_name:
                # Sanitize: spaces to hyphens, special chars to underscores
                safe_name = re.sub(r'[^\w\-]', '_', file_name.replace(' ', '-'))
                files_to_version.append({
                    'id': file_id,
                    'name': safe_name,
                    'type': 'changed'
                })

        # Prepare list of removed files for cleanup
        files_to_delete = []

        for file in removed_files:
            file_id = file.get('id', '')
            file_name = file.get('Name', '')
            
            if file_id and file_name:
                # Sanitize: spaces to hyphens, special chars to underscores
                safe_name = re.sub(r'[^\w\-]', '_', file_name.replace(' ', '-'))
                files_to_delete.append({
                    'id': file_id,
                    'name': safe_name,
                    'type': 'removed'
                })

        # Prepare list of files to download (new + changed)
        files_to_download = []

        for file in new_files + changed_files:
            file_id = file.get('id', '')
            file_name = file.get('Name', '')
            file_path = file.get('Path', '')
            
            if not file_id or not file_name or not file_path:
                continue
            
            # Sanitize: spaces to hyphens, special chars to underscores
            safe_name = re.sub(r'[^\w\-]', '_', file_name.replace(' ', '-'))
            files_to_download.append({
                'id': file_id,
                'name': safe_name,
                'path': file_path,
                'type': 'new' if file in new_files else 'changed'
            })

        {
            'files_to_version': files_to_version,
            'files_to_delete': files_to_delete,
            'files_to_archive': files_to_download,
            'current_version_index': 0,
            'current_deletion_index': 0,
            'current_archive_index': 0
        }
    input:
      - changed_files
      - removed_files
      - new_files
    output:
      - files_to_version
      - files_to_delete
      - files_to_archive
      - current_version_index
      - current_deletion_index
      - current_archive_index
    structured_output: true
    transition: CheckVersioningNeeded
  - id: CheckVersioningNeeded
    type: router
    condition: |
      {% if current_version_index|int < files_to_version|length %}
        VersionFileAndAdvance
      {% else %}
        CheckRemovalNeeded
      {% endif %}
    default_output: CheckRemovalNeeded
    input:
      - current_version_index
      - files_to_version
    routes:
      - VersionFileAndAdvance
      - CheckRemovalNeeded
  - id: VersionFileAndAdvance
    type: code
    code:
      type: fixed
      value: |-
        files_to_version = alita_state.get('files_to_version', [])
        idx_raw = alita_state.get('current_version_index', 0)

        # Defensive: ensure idx is valid integer
        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        # Defensive: validate index and process file
        if idx >= 0 and idx < len(files_to_version):
            f = files_to_version[idx]
            file_id = f.get('id', '')
            file_name = f.get('name', 'unknown')
            file_type = f.get('type', 'unknown')

            bucket_name = alita_state.get('bucket_name')
            store = alita_client.artifact(bucket_name)
            src = f"file_{file_id}_{file_name}.txt"
            dst = f"file_prev_{file_id}_{file_name}.txt"

            # Try to get existing file content
            content = store.get(src)
            
            # More specific error detection to avoid false positives in file content
            def is_error_response(content):
                if not content:
                    return True
                if isinstance(content, dict) and 'error' in content:
                    return True
                content_str = str(content).strip()
                # Only check short responses for error patterns at the start
                if len(content_str) < 500:
                    content_lower = content_str.lower()
                    if content_lower.startswith('error') or content_lower.startswith('file not found') or content_lower.startswith('does not exist'):
                        return True
                return False
            
            if not is_error_response(content):
                # Save previous version
                try:
                    store.create(dst, content)
                except Exception as e:
                    # Log error but continue - create marker file
                    error_msg = f"[ERROR CREATING PREVIOUS VERSION]\nSource: {src}\nError: {str(e)}\nTimestamp: {__import__('datetime').datetime.now().isoformat()}"
                    try:
                        store.create(f"error_prev_{file_id}_{file_name}.txt", error_msg)
                    except:
                        pass
            else:
                # File doesn't exist yet - this might be first run after file was added
                # Create a placeholder to indicate versioning was attempted
                placeholder = f"[NO PREVIOUS VERSION]\nFile: {file_name}\nID: {file_id}\nReason: Source file '{src}' not found in artifact storage.\nThis is expected for newly tracked files.\nTimestamp: {__import__('datetime').datetime.now().isoformat()}"
                try:
                    store.create(dst, placeholder)
                except:
                    pass

        {'current_version_index': idx + 1}
    input:
      - bucket_name
      - files_to_version
      - current_version_index
    output:
      - current_version_index
    structured_output: true
    transition: CheckVersioningNeeded
  - id: CheckRemovalNeeded
