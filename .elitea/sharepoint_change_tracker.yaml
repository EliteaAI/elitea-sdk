  - id: ComputeDiffAndAdvance
    type: code
    code:
      type: fixed
      value: |-
        import difflib
        from datetime import datetime

        files_to_diff = alita_state.get('files_to_diff', [])
        idx_raw = alita_state.get('current_diff_index', 0)

        # Defensive: ensure idx is valid integer
        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        # Defensive: validate index and process diff
        if idx >= 0 and idx < len(files_to_diff):
            current_file = files_to_diff[idx]

            file_id = current_file.get('id', '')
            file_name = current_file.get('name', '')
            original_name = current_file.get('original_name', '')
            
            bucket_name = alita_state.get('bucket_name')
            file_prefix = alita_state.get('file_prefix', '')
            store = alita_client.artifact(bucket_name)
            
            # Read current and previous versions
            current_file_path = f"{file_prefix}file_{file_id}_{file_name}.txt"
            previous_file_path = f"{file_prefix}file_prev_{file_id}_{file_name}.txt"
            
            current_content = store.get(current_file_path)
            previous_content = store.get(previous_file_path)
            
            # Handle errors and missing content
            # More specific error detection: check if it's a dict with 'error' key or starts with common error patterns
            def is_error_response(content):
                if not content:
                    return True
                if isinstance(content, dict) and 'error' in content:
                    return True
                content_str = str(content).strip()
                # Check if response starts with error markers (shorter check to avoid false positives in file content)
                if len(content_str) < 500:  # Only check short responses for error patterns
                    content_lower = content_str.lower()
                    if content_lower.startswith('error') or content_lower.startswith('file not found') or content_lower.startswith('does not exist'):
                        return True
                return False
            
            if is_error_response(current_content):
                current_content = ''
            else:
                current_content = str(current_content)
            
            if is_error_response(previous_content):
                previous_content = ''
            else:
                previous_content = str(previous_content)
            
            # Only compute diff if both files exist and are not placeholders
            if current_content and previous_content and '[NO PREVIOUS VERSION]' not in previous_content:
                # Compute unified diff
                previous_lines = previous_content.splitlines(keepends=True)
                current_lines = current_content.splitlines(keepends=True)
                
                diff = difflib.unified_diff(
                    previous_lines,
                    current_lines,
                    fromfile=f'{original_name} (previous)',
                    tofile=f'{original_name} (current)',
                    lineterm='\n'
                )
                
                diff_text = ''.join(diff)
                
                # Add metadata header
                timestamp = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
                lines_changed = len([line for line in diff_text.split('\n') if line.startswith('+') or line.startswith('-')])
                diff_header = (
                    f"# Diff Report for {original_name}\n"
                    f"# Generated: {timestamp}\n"
                    f"# Previous: {previous_file_path}\n"
                    f"# Current: {current_file_path}\n"
                    f"# Total lines changed: {lines_changed}\n"
                    f"\n"
                    f"{diff_text}\n"
                )
                
                # Save diff
                diff_file_path = f"{file_prefix}file_diff_{file_id}_{file_name}.txt"
                try:
                    store.create(diff_file_path, diff_header)
                except Exception as e:
                    # Create error marker
                    error_msg = f"[ERROR CREATING DIFF]\nFile: {original_name}\nError: {str(e)}\nTimestamp: {timestamp}"
                    try:
                        store.create(f"{file_prefix}error_diff_{file_id}_{file_name}.txt", error_msg)
                    except:
                        pass
            else:
                # Can't create diff - create placeholder
                timestamp = datetime.now().isoformat()
                placeholder = f"[NO DIFF COMPUTED]\nFile: {original_name}\nReason: "
                if not current_content:
                    placeholder += "Current file not found."
                elif not previous_content:
                    placeholder += "Previous file not found."
                elif '[NO PREVIOUS VERSION]' in previous_content:
                    placeholder += "No previous version available (newly tracked file)."
                placeholder += f"\nTimestamp: {timestamp}"
                
                diff_file_path = f"{file_prefix}file_diff_{file_id}_{file_name}.txt"
                try:
                    store.create(diff_file_path, placeholder)
                except:
                    pass

        {'current_diff_index': idx + 1}
    input:
      - bucket_name
      - files_to_diff
      - current_diff_index
      - file_prefix
    output:
      - current_diff_index
    structured_output: true
    transition: CheckDiffNeeded
  - id: FormatEnhancedOutput
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        from datetime import datetime

        folder_path = alita_state.get('folder_path', '')
        current_retrieval_date = alita_state.get('current_retrieval_date', '')
        last_retrieval_date = alita_state.get('last_retrieval_date', '')
        changes_filename = alita_state.get('changes_filename', '')
        username = alita_state.get('username', 'unknown')

        new_files = alita_state.get('new_files', [])
        removed_files = alita_state.get('removed_files', [])
        changed_files = alita_state.get('changed_files', [])
        unchanged_count = alita_state.get('unchanged_count', 0)
        files_to_version = alita_state.get('files_to_version', [])
        files_to_delete = alita_state.get('files_to_delete', [])
        files_to_archive = alita_state.get('files_to_archive', [])
        files_to_diff = alita_state.get('files_to_diff', [])

        # Build comprehensive report
        report_lines = [
            "# 📊 SharePoint Change Tracker Report",
            "",
            f"**Folder:** `{folder_path}`",
            f"**Run by:** `{username}`",
            f"**Current Retrieval:** `{current_retrieval_date}`",
            f"**Last Retrieval:** `{last_retrieval_date}`",
            "",
            "## 📈 Summary",
            "",
            f"- **New Files:** {len(new_files)}",
            f"- **Removed Files:** {len(removed_files)}",
            f"- **Changed Files:** {len(changed_files)}",
            f"- **Unchanged Files:** {unchanged_count}",
            f"- **Total Files:** {len(new_files) + len(changed_files) + unchanged_count}",
            f"- **Files Versioned (prev saved):** {len(files_to_version)}",
            f"- **Files Cleaned Up (deleted):** {len(files_to_delete)}",
            f"- **Files Downloaded (new + changed):** {len(files_to_archive)}",
            f"- **Diffs Computed:** {len(files_to_diff)}",
            "",
        ]

        # New Files Section
        if new_files:
            report_lines.append("## ✨ New Files")
            report_lines.append("")
            report_lines.append(f"**📥 Downloaded & Stored:** {len([f for f in files_to_archive if f.get('type') == 'new'])} files")
            report_lines.append("")
            
            for idx, file in enumerate(sorted(new_files, key=lambda x: x.get('Modified', ''), reverse=True), 1):
                name = file.get('Name', 'Unknown')
                file_id = file.get('id', 'unknown')
                path = file.get('Path', '')
                modified = file.get('Modified', '')
                link = file.get('Link', '')
                
                # Sanitize: spaces to hyphens, special chars to underscores
                safe_name = re.sub(r'[^\w\-]', '_', name.replace(' ', '-'))
                safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
                
                report_lines.append(f"### {idx}. {name}")
                report_lines.append(f"- **Path:** `{path}`")
                report_lines.append(f"- **Created:** `{modified}`")
                report_lines.append(f"- **Stored as:** `file_{file_id}_{safe_name}.txt`")
                if link:
                    report_lines.append(f"- **Link:** {link}")
                report_lines.append("")

        # Removed Files Section
        if removed_files:
            report_lines.append("## 🗑️ Removed Files")
            report_lines.append("")
            report_lines.append(f"**💾 Last State Preserved:** {len(files_to_delete)} files (renamed to file_del_*)")
            report_lines.append("**🧹 Cleanup:** Previous versions and diffs marked as deleted")
            report_lines.append("")
            
            for idx, file in enumerate(sorted(removed_files, key=lambda x: x.get('Modified', ''), reverse=True), 1):
                name = file.get('Name', 'Unknown')
                file_id = file.get('id', 'unknown')
                path = file.get('Path', '')
                modified = file.get('Modified', '')
                
                safe_name = re.sub(r'[^\w\-]', '_', name.replace(' ', '-'))
                safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
                
                report_lines.append(f"### {idx}. {name}")
                report_lines.append(f"- **Path:** `{path}`")
                report_lines.append(f"- **Last Modified:** `{modified}`")
                report_lines.append(f"- **Archived as:** `file_del_{file_id}_{safe_name}.txt`")
                report_lines.append("")

        # Changed Files Section
        if changed_files:
            report_lines.append("## 🔄 Changed Files")
            report_lines.append("")
            report_lines.append(f"**📦 Both Versions Stored:** {len([f for f in files_to_version if f.get('type') == 'changed'])} files (current + previous)")
            report_lines.append("")
            
            for idx, file in enumerate(sorted(changed_files, key=lambda x: x.get('CurrentModified', ''), reverse=True), 1):
                name = file.get('Name', 'Unknown')
                file_id = file.get('id', 'unknown')
                path = file.get('Path', '')
                prev_modified = file.get('PreviousModified', '')
                curr_modified = file.get('CurrentModified', '')
                link = file.get('Link', '')
                
                safe_name = re.sub(r'[^\w\-]', '_', name.replace(' ', '-'))
                safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
                
                report_lines.append(f"### {idx}. {name}")
                report_lines.append(f"- **Path:** `{path}`")
                report_lines.append(f"- **Previous Modified:** `{prev_modified}`")
                report_lines.append(f"- **Current Modified:** `{curr_modified}`")
                report_lines.append(f"- **Current version:** `file_{file_id}_{safe_name}.txt`")
                report_lines.append(f"- **Previous version:** `file_prev_{file_id}_{safe_name}.txt`")
                report_lines.append(f"- **Diff:** `file_diff_{file_id}_{safe_name}.txt`")
                if link:
                    report_lines.append(f"- **Link:** {link}")
                report_lines.append("")

        # No changes
        if not new_files and not removed_files and not changed_files:
            is_first_run = alita_state.get('is_first_run', False)
            if is_first_run:
                report_lines.append("ℹ️ **First run** - Baseline snapshot created in artifact storage.")
            else:
                report_lines.append("✅ **No changes detected** since last retrieval.")

        # Footer
        bucket_name = alita_state.get('bucket_name', '')
        joined_filename = alita_state.get('joined_filename', '')
        joined_status = alita_state.get('joined_status', '')

        report_lines.extend([
            "",
            "---",
            "",
            "## 📂 Artifact Storage",
            f"**Bucket:** `{bucket_name}`",
            "",
            "- `retrieval_log.txt` — run history (last 5, auto-cleanup)",
            "- `snapshot.json` — current file state",
        ])

        if changes_filename:
            report_lines.append(f"- `{changes_filename}` — this run's change report (with artifact filenames)")
        else:
            report_lines.append("- `changes_YYYYMMDD_HHMMSS_username.json` — per-run change report (last 5 kept, auto-cleanup)")

        # Only mention context file if it was created (i.e., if there were changes)
        if joined_filename:
            report_lines.append(f"- `{joined_filename}` — combined file report (new + changed files, updated this run)")

        report_lines.extend([
            "- `file_[Id]_[name].txt` — current file versions",
            "- `file_prev_[Id]_[name].txt` — previous versions of changed files",
            "- `file_diff_[Id]_[name].txt` — unified diffs for changed files",
            "- `file_del_[Id]_[name].txt` — last known state of removed files",
        ])

        # Add joined file status
        if joined_status:
            report_lines.extend([
                "",
                "### 📄 Joined File",
                f"{joined_status}",
            ])

        report = "\n".join(report_lines)

        msgs = list(alita_state.get('messages', []))
        msgs.append({"role": "assistant", "content": report})

        {'messages': msgs}
    input:
      - bucket_name
      - folder_path
      - current_retrieval_date
      - last_retrieval_date
      - changes_filename
      - username
      - input_id
      - new_files
      - removed_files
      - changed_files
      - unchanged_count
      - is_first_run
      - files_to_version
      - files_to_delete
      - files_to_archive
      - files_to_diff
      - joined_filename
      - joined_status
    output:
      - messages
    structured_output: true
    transition: END
  - id: CreateJoinedFile
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        from datetime import datetime

        bucket_name = alita_state.get('bucket_name')
        store = alita_client.artifact(bucket_name)
        file_prefix = alita_state.get('file_prefix', '')

        new_files = alita_state.get('new_files', [])
        changed_files = alita_state.get('changed_files', [])
        current_snapshot = alita_state.get('current_snapshot', {})
        current_retrieval_date = alita_state.get('current_retrieval_date', '')
        username = alita_state.get('username', 'unknown')
        input_id = alita_state.get('input_id', '')

        # Build diff filename for incremental changes (new + changed with diffs)
        diff_filename = f"{input_id}_sp_diff__{username}.md" if username else f"{input_id}_sp_diff.md"

        # Build diff content (incremental changes)
        sections = []
        sections.append("=" * 80)
        sections.append(f"SharePoint Combined Files Report")
        sections.append(f"Generated: {current_retrieval_date}")
        sections.append("=" * 80)
        sections.append("")

        # Add new files (full content)
        if new_files:
            sections.append("\n" + "=" * 80)
            sections.append(f"NEW FILES ({len(new_files)} files)")
            sections.append("=" * 80 + "\n")
            
            for file in new_files:
                name = file.get('Name', 'Unknown')
                file_id = file.get('id', 'unknown')
                path = file.get('Path', '')
                modified = file.get('Modified', '')
                
                safe_name = re.sub(r'[^\w\-]', '_', name.replace(' ', '-'))
                safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
                artifact_filename = f"{file_prefix}file_{file_id}_{safe_name}.txt"
                
                sections.append("\n" + "-" * 80)
                sections.append(f"File: {name}")
                sections.append(f"Path: {path}")
                sections.append(f"Modified: {modified}")
                sections.append(f"Artifact: {artifact_filename}")
                sections.append("-" * 80)
                
                # Fetch file content from artifact storage
                try:
                    content = store.get(artifact_filename)
                    if content and not any(err in str(content).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
                        sections.append(str(content))
                    else:
                        sections.append(f"[Content not available: {content}]")
                except Exception as e:
                    sections.append(f"[Error reading content: {e}]")
                
                sections.append("")

        # Add changed files (diff only)
        if changed_files:
            sections.append("\n" + "=" * 80)
            sections.append(f"CHANGED FILES ({len(changed_files)} files) - DIFFS ONLY")
            sections.append("=" * 80 + "\n")
            
            for file in changed_files:
                name = file.get('Name', 'Unknown')
                file_id = file.get('id', 'unknown')
                path = file.get('Path', '')
                prev_modified = file.get('PreviousModified', '')
                curr_modified = file.get('CurrentModified', '')
                
                safe_name = re.sub(r'[^\w\-]', '_', name.replace(' ', '-'))
                safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
                artifact_diff_filename = f"{file_prefix}file_diff_{file_id}_{safe_name}.txt"
                
                sections.append("\n" + "-" * 80)
                sections.append(f"File: {name}")
                sections.append(f"Path: {path}")
                sections.append(f"Previous Modified: {prev_modified}")
                sections.append(f"Current Modified: {curr_modified}")
                sections.append(f"Diff Artifact: {artifact_diff_filename}")
                sections.append("-" * 80)
                
                # Fetch diff content from artifact storage
                try:
                    file_diff_content = store.get(artifact_diff_filename)
                    if file_diff_content and not any(err in str(file_diff_content).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
                        sections.append(str(file_diff_content))
                    else:
                        sections.append(f"[Diff not available: {file_diff_content}]")
                except Exception as e:
                    sections.append(f"[Error reading diff: {e}]")
                
                sections.append("")

        # Add footer
        sections.append("\n" + "=" * 80)
        sections.append("END OF REPORT")
        sections.append("=" * 80)

        # Join all sections (this becomes the diff file)
        diff_content = "\n".join(sections)

        # Build context filename for ALL current files (this becomes the main context file)
        context_filename = f"{input_id}_sp_context__{username}.md" if username else f"{input_id}_sp_context.md"
        context_sections = []
        context_sections.append("=" * 80)
        context_sections.append(f"SharePoint Context - Full Snapshot")
        context_sections.append(f"Generated: {current_retrieval_date}")
        context_sections.append(f"Total files: {len(current_snapshot)}")
        context_sections.append("=" * 80)
        context_sections.append("")

        # Add ALL current files with full content
        for idx, (path, metadata) in enumerate(sorted(current_snapshot.items()), 1):
            name = metadata.get('Name', 'Unknown')
            file_id = metadata.get('id', '')
            modified = metadata.get('Modified', '')
            
            if not file_id or not name:
                continue
            
            safe_name = re.sub(r'[^\w\-]', '_', name.replace(' ', '-'))
            safe_name = re.sub(r'-+', '-', safe_name)
            artifact_filename = f"{file_prefix}file_{file_id}_{safe_name}.txt"
            
            context_sections.append("\n" + "-" * 80)
            context_sections.append(f"File {idx}/{len(current_snapshot)}: {name}")
            context_sections.append(f"Path: {path}")
            context_sections.append(f"Modified: {modified}")
            context_sections.append(f"Artifact: {artifact_filename}")
            context_sections.append("-" * 80)
            
            # Fetch file content from artifact storage
            try:
                content = store.get(artifact_filename)
                if content and not any(err in str(content).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
                    context_sections.append(str(content))
                else:
                    context_sections.append(f"[Content not available: {content}]")
            except Exception as e:
                context_sections.append(f"[Error reading content: {e}]")
            
            context_sections.append("")

        context_sections.append("\n" + "=" * 80)
        context_sections.append("END OF SNAPSHOT")
        context_sections.append("=" * 80)

        context_content = "\n".join(context_sections)

        # Save to main bucket artifact storage with prefix (subfolder structure)
        joined_status = ''
        try:
            # Save context file (full snapshot) to sp-repo
            sp_repo_context_filename = f"{file_prefix}{context_filename}"
            store.create(sp_repo_context_filename, context_content)
            joined_status = f"✅ Created `{sp_repo_context_filename}` (context) in sp-repo ({len(context_content)} bytes)"
            
            # Also save to ba-user-stories bucket (no prefix, root level)
            ba_store = alita_client.artifact('ba-user-stories')
            
            # Save diff file (incremental changes)
            ba_store.create(diff_filename, diff_content)
            joined_status += f" + `{diff_filename}` (diff)"
            
            # Save context file (full snapshot - main file)
            ba_store.create(context_filename, context_content)
            joined_status += f" + `{context_filename}` (context) in ba-user-stories"
        except Exception as e:
            joined_status = f"❌ Error: {str(e)}"
            context_filename = f"error_{context_filename}"

        {'joined_filename': sp_repo_context_filename if 'sp_repo_context_filename' in locals() else context_filename, 'joined_status': joined_status}
    input:
      - bucket_name
      - new_files
      - changed_files
      - current_snapshot
      - current_retrieval_date
      - username
      - input_id
      - file_prefix
    output:
      - joined_filename
      - joined_status
    structured_output: true
    transition: FormatEnhancedOutput
