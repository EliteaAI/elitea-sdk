state:
  all_files:
    type: list
    value: []
  bucket_name:
    type: str
    value: ''
  changed_files:
    type: list
    value: []
  changes_filename:
    type: str
    value: ''
  current_archive_index:
    type: int
    value: 0
  current_deletion_index:
    type: int
    value: 0
  current_diff_index:
    type: int
    value: 0
  current_file_path:
    type: str
    value: ''
  current_retrieval_date:
    type: str
    value: ''
  current_snapshot:
    type: dict
    value: {}
  current_version_index:
    type: int
    value: 0
  downloaded_content:
    type: str
    value: ''
  error_message:
    type: str
    value: ''
  file_prefix:
    type: str
    value: ''
  files_to_archive:
    type: list
    value: []
  files_to_delete:
    type: list
    value: []
  files_to_diff:
    type: list
    value: []
  files_to_version:
    type: list
    value: []
  folder_path:
    type: str
    value: ''
  found_folders:
    type: list
    value: []
  input:
    type: str
  input_bucket_name:
    type: str
    value: ''
  input_folder_path:
    type: str
    value: ''
  input_id:
    type: str
    value: ''
  is_first_run:
    type: bool
    value: false
  joined_filename:
    type: str
    value: ''
  joined_status:
    type: str
    value: ''
  last_retrieval_date:
    type: str
    value: ''
  messages:
    type: list
  new_files:
    type: list
    value: []
  previous_snapshot:
    type: dict
    value: {}
  reload:
    type: bool
    value: false
  removed_files:
    type: list
    value: []
  search_base_path:
    type: str
    value: ''
  unchanged_count:
    type: int
    value: 0
  username:
    type: str
    value: unknown
  validation_passed:
    type: bool
    value: false
entry_point: ParseInput
nodes:
  - id: ParseInput
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        from datetime import datetime

        input_str = alita_state.get('input', '').strip()

        if not input_str:
            result = {
                "validation_passed": False,
                "error_message": "Input required. Provide JSON with 'id':\n{\"id\": \"12345\", \"folder_path\": \"optional-search-base\", \"bucket_name\": \"optional-bucket\"}",
                "folder_path": "",
                "input_bucket_name": "",
                "input_id": "",
                "input_folder_path": "",
                "search_base_path": "",
                "current_retrieval_date": datetime.now().isoformat()
            }
        else:
            parse_failed = False
            try:
                input_data = json.loads(input_str)
            except json.JSONDecodeError:
                # Try to fix Python-style booleans
                fixed = re.sub(r':\s*True\b', ': true', input_str)
                fixed = re.sub(r':\s*False\b', ': false', fixed)
                try:
                    input_data = json.loads(fixed)
                except json.JSONDecodeError:
                    parse_failed = True
                    result = {
                        "validation_passed": False,
                        "error_message": f"Invalid JSON. Expected: {{\"id\": \"12345\"}}\nReceived: \"{input_str}\"",
                        "folder_path": "",
                        "input_bucket_name": "",
                        "input_id": "",
                        "input_folder_path": "",
                        "search_base_path": "",
                        "current_retrieval_date": datetime.now().isoformat()
                    }

            if not parse_failed:
                if not isinstance(input_data, dict):
                    result = {
                        "validation_passed": False,
                        "error_message": "Input must be a JSON object.",
                        "folder_path": "",
                        "input_bucket_name": "",
                        "input_id": "",
                        "input_folder_path": "",
                        "search_base_path": "",
                        "current_retrieval_date": datetime.now().isoformat()
                    }
                elif 'id' not in input_data:
                    result = {
                        "validation_passed": False,
                        "error_message": "Field 'id' is required. Provide: {\"id\": \"12345\", \"folder_path\": \"optional\", \"bucket_name\": \"optional\"}",
                        "folder_path": "",
                        "input_bucket_name": "",
                        "input_id": "",
                        "input_folder_path": "",
                        "search_base_path": "",
                        "current_retrieval_date": datetime.now().isoformat()
                    }
                else:
                    feature_id = str(input_data['id']).strip()
                    if not feature_id:
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'id' cannot be empty.",
                            "folder_path": "",
                            "input_bucket_name": "",
                            "input_id": "", 
                            "input_folder_path": "",
                            "search_base_path": "",
                            "current_retrieval_date": datetime.now().isoformat()
                        }
                    else:
                        # Get optional parameters with defaults
                        search_base = input_data.get('folder_path', '/sites/EPAMPPG-LFAProjectExecution/Shared Documents/General/LFA Cloud EPAM Delivery Scope - Features')
                        bucket = input_data.get('bucket_name', 'sp-repo')
                        reload = input_data.get('reload', False)
                        
                        # Get username from alita_client or input
                        username = input_data.get('username', '')
                        if not username:
                            try:
                                user_data = alita_client.get_user_data()
                                username = user_data.get('name', '') if isinstance(user_data, dict) else ''
                            except:
                                username = ''
                        if not username:
                            username = 'unknown'
                        username = username.lower().replace(' ', '_')[:20]  # Sanitize: max 20 chars, lowercase, no spaces
                        
                        result = {
                            "validation_passed": True,
                            "error_message": "",
                            "folder_path": "",  # Will be set after finding the folder
                            "input_bucket_name": bucket,
                            "username": username,
                            "reload": reload,
                            "input_id": feature_id,
                            "input_folder_path": search_base,
                            "search_base_path": search_base,
                            "current_retrieval_date": datetime.now().isoformat()
                        }

        result
    input: []
    output:
      - input_bucket_name
      - input_id
      - input_folder_path
      - search_base_path
      - folder_path
      - username
      - reload
    structured_output: true
    transition: ValidationRouter
  - id: ValidationRouter
    type: router
    condition: |
      {% if validation_passed %}
        FindFeatureFolder
      {% else %}
        FormatError
      {% endif %}
    default_output: FormatError
    input:
      - validation_passed
    routes:
      - FormatError
      - FindFeatureFolder
  - id: FindFeatureFolder
    type: code
    code:
      type: fixed
      value: |-
        # Prepare to search for folder containing the feature ID in its name
        input_id = alita_state.get('input_id', '').strip()
        search_base_path = alita_state.get('search_base_path', '').strip()

        # Just pass through - actual search happens in SearchFolders toolkit node
        result = {
            "found_folders": []
        }

        result
    input:
      - input_id
      - search_base_path
    output:
      - found_folders
    structured_output: true
    transition: SearchFolders
  - id: SearchFolders
    type: toolkit
    input:
      - search_base_path
    input_mapping:
      folder_name:
        type: variable
        value: search_base_path
      form_name:
        type: fixed
        value: null
      include_extensions:
        type: fixed
        value: null
      limit_files:
        type: fixed
        value: 10000
      skip_extensions:
        type: fixed
        value: null
    output:
      - all_files
    structured_output: true
    tool: get_files_list
    toolkit_name: LFAInternalSharePoint
    transition: FilterFoldersByID
  - id: FilterFoldersByID
    type: code
    code:
      type: fixed
      value: |-
        input_id = str(alita_state.get('input_id', '')).strip()
        search_base_path = str(alita_state.get('search_base_path', '')).strip()
        all_files = alita_state.get('all_files', [])

        if not isinstance(all_files, list):
            all_files = []

        # Extract first-level subfolders that contain the ID
        found_folders = []
        found_folder_paths = set()

        for item in all_files:
            if not isinstance(item, dict):
                continue

            item_path = item.get('Path', '') or item.get('ServerRelativeUrl', '')

            if not item_path or not item_path.startswith(search_base_path):
                continue

            # Get the relative path after the base
            relative_path = item_path[len(search_base_path):].lstrip('/')
            path_parts = [p for p in relative_path.split('/') if p]

            # Only look at first segment (direct subfolder)
            if len(path_parts) > 0:
                first_folder = path_parts[0]

                # Check if this first-level folder contains the ID
                if input_id.lower() in first_folder.lower():
                    folder_path = f"{search_base_path}/{first_folder}"

                    # Only add if not already tracked
                    if folder_path not in found_folder_paths:
                        found_folder_paths.add(folder_path)
                        found_folders.append({
                            'Name': first_folder,
                            'Path': folder_path,
                            'Modified': str(item.get('Modified', '')),
                            'Created': str(item.get('Created', '')),
                            'Link': '',
                            'id': ''
                        })

        result = {'found_folders': found_folders}
        result
    input:
      - input_id
      - all_files
      - search_base_path
    output:
      - found_folders
    structured_output: true
    transition: ValidateFolderSearch
  - id: ValidateFolderSearch
    type: router
    condition: |
      {% if found_folders|length == 0 %}
        FolderSearchError
      {% elif found_folders|length > 1 %}
        FolderSearchError
      {% else %}
        UpdateFolderPath
      {% endif %}
    default_output: FolderSearchError
    input:
      - found_folders
    routes:
      - FolderSearchError
      - UpdateFolderPath
  - id: FolderSearchError
    type: code
    code:
      type: fixed
      value: |-
        input_id = alita_state.get('input_id', '')
        search_base_path = alita_state.get('search_base_path', '')
        found_folders = alita_state.get('found_folders', [])

        if len(found_folders) == 0:
            error_message = f"No folder found containing ID '{input_id}' in base path '{search_base_path}'."
        elif len(found_folders) > 1:
            folder_names = [f['Name'] for f in found_folders]
            error_message = f"Multiple folders found containing ID '{input_id}' in base path '{search_base_path}':\n" + "\n".join([f"  - {name}" for name in folder_names]) + "\n\nPlease provide a more specific ID or use direct folder_path."
        else:
            error_message = f"Internal error in folder search validation."

        report = f"❌ Failed to locate unique feature folder.\n\n**Error:** {error_message}\n\nPlease check the input and try again."

        msgs = list(alita_state.get('messages', []))
        msgs.append({"role": "assistant", "content": report})
        result = {"messages": msgs}
        result
    input:
      - input_id
      - search_base_path
      - found_folders
    output:
      - messages
    structured_output: true
    transition: END
  - id: UpdateFolderPath
    type: code
    code:
      type: fixed
      value: |-
        # Extract the path from the single found folder
        found_folders = alita_state.get('found_folders', [])

        if len(found_folders) == 1:
            folder = found_folders[0]
            folder_path = folder.get('Path', '')
            result = {
                'folder_path': folder_path
            }
        else:
            # Should not reach here due to router validation, but defensive
            result = {
                'folder_path': ''
            }

        result
    input:
      - found_folders
    output:
      - folder_path
    structured_output: true
    transition: LoadState
  - id: FormatError
    type: code
    code:
      type: fixed
      value: |-
        error_message = alita_state.get('error_message', '')

        report = f"❌ Failed to process request.\n\n**Error:** {error_message}\n\nPlease check the input and try again."

        msgs = list(alita_state.get('messages', []))
        msgs.append({"role": "assistant", "content": report})
        result = {"messages": msgs}
        result
    input:
      - error_message
    output:
      - messages
    structured_output: true
    transition: END
  - id: LoadState
    type: code
    code:
      type: fixed
      value: |-
        import json

        # Use input bucket_name if provided, otherwise use default from state
        input_bucket_name = alita_state.get('input_bucket_name', '').strip()
        default_bucket_name = alita_state.get('bucket_name')
        bucket_name = input_bucket_name if input_bucket_name else default_bucket_name

        store = alita_client.artifact(bucket_name)

        # Get input_id for file prefixing
        input_id = alita_state.get('input_id', '')
        file_prefix = f"{input_id}/" if input_id else ''

        # Check if reload is requested (force full content)
        reload = alita_state.get('reload', False)

        # Load retrieval log
        is_first_run = False
        last_retrieval_date = '1900-01-01T00:00:00'
        log_raw = store.get(f'{file_prefix}retrieval_log.txt')

        if log_raw and not any(err in str(log_raw).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
            lines = str(log_raw).strip().split('\n')
            if lines:
                # Parse last entry: "date" or "date|username"
                last_entry = lines[-1].strip()
                parts = last_entry.split('|', 1)
                last_retrieval_date = parts[0]  # Extract just the date
        else:
            is_first_run = True

        # Load snapshot (skip if reload=true to force full content)
        previous_snapshot = {}
        if not reload:
            snap_raw = store.get(f'{file_prefix}snapshot.json')
            if snap_raw and not any(err in str(snap_raw).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
                try:
                    previous_snapshot = json.loads(str(snap_raw))
                except json.JSONDecodeError:
                    pass

        {
            'bucket_name': bucket_name,
            'last_retrieval_date': last_retrieval_date,
            'is_first_run': is_first_run,
            'previous_snapshot': previous_snapshot,
            'file_prefix': file_prefix
        }
    input:
      - input_bucket_name
      - input_id
      - reload
    output:
      - bucket_name
      - last_retrieval_date
      - is_first_run
      - previous_snapshot
      - file_prefix
    structured_output: true
    transition: GetFilesFromSharepoint
  - id: GetFilesFromSharepoint
    type: toolkit
    input:
      - folder_path
    input_mapping:
      folder_name:
        type: variable
        value: folder_path
      form_name:
        type: fixed
        value: null
      include_extensions:
        type: fixed
        value: null
      limit_files:
        type: fixed
        value: 10000
      skip_extensions:
        type: fixed
        value: null
    output:
      - all_files
    structured_output: true
    tool: get_files_list
    toolkit_name: LFAInternalSharePoint
    transition: CheckToolkitErrorAfterGetFiles
  - id: CheckToolkitErrorAfterGetFiles
    type: code
    code:
      type: fixed
      value: |-
        all_files = alita_state.get('all_files', [])
        error_detected = False
        error_message = ''

        # Check for toolkit errors (returned as string or dict with error)
        if isinstance(all_files, str) and ('Traceback' in all_files or 'Error' in all_files):
            error_detected = True
            error_message = all_files[:1000]
        elif isinstance(all_files, dict) and 'error' in all_files:
            error_detected = True
            error_message = str(all_files.get('error', ''))[:1000]

        result = {'all_files': all_files, 'error_detected': error_detected, 'error_message': error_message}
        result
    input:
      - all_files
    output:
      - all_files
      - error_detected
      - error_message
    structured_output: true
    transition: RouterAfterGetFiles
  - id: RouterAfterGetFiles
    type: router
    condition: |
      {% if error_detected %}
        FormatError
      {% else %}
        CompareSnapshots
      {% endif %}
    default_output: FormatError
    input:
      - error_detected
    routes:
      - FormatError
      - CompareSnapshots
  - id: CompareSnapshots
    type: code
    code:
      type: fixed
      value: |-
        from datetime import datetime

        all_files = alita_state.get('all_files', [])
        previous_snapshot = alita_state.get('previous_snapshot', {})
        last_retrieval_date = alita_state.get('last_retrieval_date', '')

        # Create current snapshot: {path: {metadata}}
        # Try multiple possible path field names
        current_snapshot = {}
        for file in all_files:
            if isinstance(file, dict):
                # Try different possible path field names
                path = (file.get('Path', '') or 
                       file.get('ServerRelativeUrl', '') or
                       file.get('FileRef', '') or
                       file.get('FileSystemObjectType', '') or
                       file.get('Url', ''))
                
                if path:
                    current_snapshot[path] = {
                        'Name': file.get('Name', ''),
                        'Modified': file.get('Modified', ''),
                        'Created': file.get('Created', ''),
                        'Link': file.get('Link', ''),
                        'id': file.get('id', '')
                    }

        # Parse last retrieval date
        try:
            last_date = datetime.fromisoformat(last_retrieval_date.replace('Z', ''))
        except:
            last_date = datetime(1900, 1, 1)

        # Identify changes
        new_files = []
        removed_files = []
        changed_files = []
        unchanged_count = 0

        current_paths = set(current_snapshot.keys())
        previous_paths = set(previous_snapshot.keys())

        # New files
        for path in current_paths - previous_paths:
            new_files.append({
                'Path': path,
                **current_snapshot[path]
            })

        # Removed files
        for path in previous_paths - current_paths:
            removed_files.append({
                'Path': path,
                **previous_snapshot[path]
            })

        # Changed or unchanged files
        for path in current_paths & previous_paths:
            current_modified = current_snapshot[path].get('Modified', '')
            previous_modified = previous_snapshot[path].get('Modified', '')
            
            # Compare modification dates
            if current_modified != previous_modified:
                # File was modified
                try:
                    current_mod_dt = datetime.fromisoformat(current_modified.replace('Z', '').split('+')[0].split('.')[0])
                    if current_mod_dt > last_date:
                        changed_files.append({
                            'Path': path,
                            'PreviousModified': previous_modified,
                            'CurrentModified': current_modified,
                            **current_snapshot[path]
                        })
                    else:
                        unchanged_count += 1
                except:
                    unchanged_count += 1
            else:
                unchanged_count += 1

        {
            'current_snapshot': current_snapshot,
            'new_files': new_files,
            'removed_files': removed_files,
            'changed_files': changed_files,
            'unchanged_count': unchanged_count
        }
    input:
      - all_files
      - previous_snapshot
      - last_retrieval_date
    output:
      - current_snapshot
      - new_files
      - removed_files
      - changed_files
      - unchanged_count
    structured_output: true
    transition: SaveState
  - id: SaveState
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        from datetime import datetime

        bucket_name = alita_state.get('bucket_name')
        store = alita_client.artifact(bucket_name)
        file_prefix = alita_state.get('file_prefix', '')

        current_retrieval_date_raw = alita_state.get('current_retrieval_date', '')
        last_retrieval_date = alita_state.get('last_retrieval_date', '')
        current_snapshot = alita_state.get('current_snapshot', {})
        new_files = alita_state.get('new_files', [])
        removed_files = alita_state.get('removed_files', [])
        changed_files = alita_state.get('changed_files', [])
        username = alita_state.get('username', 'unknown')
        input_id = alita_state.get('input_id', '')

        # Truncate microseconds from current_retrieval_date for consistency
        # This ensures retrieval_log timestamps match changes_*.json filenames
        dt = datetime.fromisoformat(current_retrieval_date_raw.replace('Z', ''))
        current_retrieval_date = dt.strftime('%Y-%m-%dT%H:%M:%S')

        # 1. Load existing retrieval log to track removals
        old_log_lines = []
        log_raw = store.get(f'{file_prefix}retrieval_log.txt')
        if log_raw and not any(err in str(log_raw).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
            old_log_lines = [line.strip() for line in str(log_raw).strip().split('\n') if line.strip()]

        # 2. Build new log entry with username: "YYYY-MM-DDTHH:MM:SS|username"
        log_entry = f"{current_retrieval_date}|{username}"

        # 3. Build new log (keep last 5 entries)
        # Start with all existing log lines, append new entry, then keep last 5
        log_lines = old_log_lines.copy()
        log_lines.append(log_entry)
        log_lines = log_lines[-5:]

        # 4. Identify dates being removed (dates in old_log but not in new log)
        dates_to_remove = set(old_log_lines) - set(log_lines)

        # 5. Delete corresponding changes_*.json and joined_files_*.txt files for removed dates
        for removed_entry in dates_to_remove:
            # Parse entry: "date" or "date|username"
            parts = removed_entry.split('|', 1)
            removed_date = parts[0]
            removed_user = parts[1] if len(parts) > 1 else ''
            
            # Parse ISO date and convert to filename format
            dt_removed = datetime.fromisoformat(removed_date.replace('Z', ''))
            timestamp_str = dt_removed.strftime('%Y%m%d_%H%M%S')
            
            # Delete changes file
            if removed_user:
                changes_filename_to_delete = f"{file_prefix}changes_{timestamp_str}_{removed_user}.json"
            else:
                changes_filename_to_delete = f"{file_prefix}changes_{timestamp_str}.json"
            
            try:
                store.delete(changes_filename_to_delete, check_exists=False)
            except Exception as e:
                if 'getReader' not in str(e):
                    error_log = f"[DELETION FAILED]\nTarget: {changes_filename_to_delete}\nLog Entry: {removed_entry}\nError: {str(e)}\nCurrent time: {current_retrieval_date}"
                    try:
                        store.create(f"{file_prefix}error_deletion_{timestamp_str}_{removed_user if removed_user else 'unknown'}.txt", error_log)
                    except:
                        pass
            
            # Joined file cleanup removed - file is overwritten each run (not timestamp-based)

        # 5. Save updated retrieval log
        r = store.create(f'{file_prefix}retrieval_log.txt', '\n'.join(log_lines))

        # 6. Save snapshot to main bucket only
        snapshot_json = json.dumps(current_snapshot, indent=2, ensure_ascii=False)
        r = store.create(f'{file_prefix}snapshot.json', snapshot_json)

        # 7. Enhance file entries with artifact storage filenames
        def add_artifact_filenames(files, file_type):
            enhanced_files = []
            for file in files:
                file_id = file.get('id', '')
                file_name = file.get('Name', '')
                enhanced_file = dict(file)
                
                if file_id and file_name:
                    # Sanitize: spaces to hyphens, special chars to underscores
                    safe_name = re.sub(r'[^\w\-]', '_', file_name.replace(' ', '-'))
                    safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
                    enhanced_file['artifact_storage'] = {
                        'current': f"{file_prefix}file_{file_id}_{safe_name}.txt"
                    }
                    
                    if file_type == 'changed':
                        enhanced_file['artifact_storage']['previous'] = f"{file_prefix}file_prev_{file_id}_{safe_name}.txt"
                        enhanced_file['artifact_storage']['diff'] = f"{file_prefix}file_diff_{file_id}_{safe_name}.txt"
                    elif file_type == 'removed':
                        enhanced_file['artifact_storage']['deleted'] = f"{file_prefix}file_del_{file_id}_{safe_name}.txt"
                
                enhanced_files.append(enhanced_file)
            return enhanced_files

        enhanced_new_files = add_artifact_filenames(new_files, 'new')
        enhanced_removed_files = add_artifact_filenames(removed_files, 'removed')
        enhanced_changed_files = add_artifact_filenames(changed_files, 'changed')

        # 8. Save changes report with artifact filenames
        # Use truncated timestamp (already parsed from current_retrieval_date) to match retrieval_log
        # Include username in filename: changes_YYYYMMDD_HHMMSS_username.json
        timestamp = dt.strftime('%Y%m%d_%H%M%S')
        changes_filename = f"{file_prefix}changes_{timestamp}_{username}.json"
        changes_data = {
            'retrieval_date': current_retrieval_date,
            'username': username,
            'summary': {
                'new_files_count': len(new_files),
                'removed_files_count': len(removed_files),
                'changed_files_count': len(changed_files)
            },
            'new_files': enhanced_new_files,
            'removed_files': enhanced_removed_files,
            'changed_files': enhanced_changed_files
        }
        r = store.create(changes_filename, json.dumps(changes_data, indent=2, ensure_ascii=False))

        {'changes_filename': changes_filename}
    input:
      - bucket_name
