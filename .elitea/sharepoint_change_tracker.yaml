state:
  all_files:
    type: list
    value: []
  bucket_name:
    type: str
    value: ''
  changed_files:
    type: list
    value: []
  changes_filename:
    type: str
    value: ''
  current_archive_index:
    type: int
    value: 0
  current_deletion_index:
    type: int
    value: 0
  current_diff_index:
    type: int
    value: 0
  current_file_path:
    type: str
    value: ''
  current_retrieval_date:
    type: str
    value: ''
  current_snapshot:
    type: dict
    value: {}
  current_version_index:
    type: int
    value: 0
  downloaded_content:
    type: str
    value: ''
  error_detected:
    type: bool
    value: false
  error_message:
    type: str
    value: ''
  file_prefix:
    type: str
    value: ''
  files_to_archive:
    type: list
    value: []
  files_to_delete:
    type: list
    value: []
  files_to_diff:
    type: list
    value: []
  files_to_version:
    type: list
    value: []
  folder_path:
    type: str
    value: ''
  found_folders:
    type: list
    value: []
  input:
    type: str
  input_bucket_name:
    type: str
    value: ''
  input_id:
    type: str
    value: ''
  is_first_run:
    type: bool
    value: false
  joined_filename:
    type: str
    value: ''
  joined_status:
    type: str
    value: ''
  last_retrieval_date:
    type: str
    value: ''
  messages:
    type: list
  new_files:
    type: list
    value: []
  previous_snapshot:
    type: dict
    value: {}
  reload:
    type: bool
    value: false
  removed_files:
    type: list
    value: []
  search_base_path:
    type: str
    value: ''
  unchanged_count:
    type: int
    value: 0
  username:
    type: str
    value: unknown
  validation_passed:
    type: bool
    value: false
entry_point: ParseInput
nodes:
  - id: ParseInput
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        from datetime import datetime

        input_str = alita_state.get('input', '').strip()

        if not input_str:
            result = {
                "validation_passed": False,
                "error_message": "Input required. Provide JSON with 'id':\n{\"id\": \"12345\", \"folder_path\": \"optional-search-base\", \"bucket_name\": \"optional-bucket\"}",
                "folder_path": "",
                "input_bucket_name": "",
                "input_id": "",
                "search_base_path": "",
                "current_retrieval_date": datetime.now().isoformat()
            }
        else:
            parse_failed = False
            try:
                input_data = json.loads(input_str)
            except json.JSONDecodeError:
                # Try to fix Python-style booleans
                fixed = re.sub(r':\s*True\b', ': true', input_str)
                fixed = re.sub(r':\s*False\b', ': false', fixed)
                try:
                    input_data = json.loads(fixed)
                except json.JSONDecodeError:
                    parse_failed = True
                    result = {
                        "validation_passed": False,
                        "error_message": f"Invalid JSON. Expected: {{\"id\": \"12345\"}}\nReceived: \"{input_str}\"",
                        "folder_path": "",
                        "input_bucket_name": "",
                        "input_id": "",
                        "search_base_path": "",
                        "current_retrieval_date": datetime.now().isoformat()
                    }

            if not parse_failed:
                if not isinstance(input_data, dict):
                    result = {
                        "validation_passed": False,
                        "error_message": "Input must be a JSON object.",
                        "folder_path": "",
                        "input_bucket_name": "",
                        "input_id": "",
                        "search_base_path": "",
                        "current_retrieval_date": datetime.now().isoformat()
                    }
                elif 'id' not in input_data:
                    result = {
                        "validation_passed": False,
                        "error_message": "Field 'id' is required. Provide: {\"id\": \"12345\", \"folder_path\": \"optional\", \"bucket_name\": \"optional\"}",
                        "folder_path": "",
                        "input_bucket_name": "",
                        "input_id": "",
                        "search_base_path": "",
                        "current_retrieval_date": datetime.now().isoformat()
                    }
                else:
                    feature_id = str(input_data['id']).strip()
                    if not feature_id:
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'id' cannot be empty.",
                            "folder_path": "",
                            "input_bucket_name": "",
                            "input_id": "",
                            "search_base_path": "",
                            "current_retrieval_date": datetime.now().isoformat()
                        }
                    else:
                        # Get optional parameters with defaults
                        search_base = input_data.get('folder_path', '/sites/EPAMPPG-LFAProjectExecution/Shared Documents/General/LFA Cloud EPAM Delivery Scope - Features')
                        bucket = input_data.get('bucket_name', 'sp-repo')
                        reload = input_data.get('reload', False)
                        
                        # Get username from alita_client or input
                        username = input_data.get('username', '')
                        if not username:
                            try:
                                user_data = alita_client.get_user_data()
                                username = user_data.get('name', '') if isinstance(user_data, dict) else ''
                            except:
                                username = ''
                        if not username:
                            username = 'unknown'
                        username = username.lower().replace(' ', '_')[:20]  # Sanitize: max 20 chars, lowercase, no spaces
                        
                        result = {
                            "validation_passed": True,
                            "error_message": "",
                            "folder_path": "",  # Will be set after finding the folder
                            "input_bucket_name": bucket,
                            "username": username,
                            "reload": reload,
                            "input_id": feature_id,
                            "search_base_path": search_base,
                            "current_retrieval_date": datetime.now().isoformat()
                        }

        result
    input: []
    output:
      - input_bucket_name
      - input_id
      - search_base_path
      - folder_path
      - username
      - reload
    structured_output: true
    transition: ValidationRouter
  - id: ValidationRouter
    type: router
    condition: |
      {% if validation_passed %}
        SearchFolders
      {% else %}
        FormatError
      {% endif %}
    default_output: FormatError
    input:
      - validation_passed
    routes:
      - FormatError
      - SearchFolders
  - id: SearchFolders
    type: toolkit
    input:
      - search_base_path
    input_mapping:
      folder_name:
        type: variable
        value: search_base_path
      form_name:
        type: fixed
        value: null
      include_extensions:
        type: fixed
        value: null
      limit_files:
        type: fixed
        value: 10000
      skip_extensions:
        type: fixed
        value: null
    output:
      - all_files
    structured_output: true
    tool: get_files_list
    toolkit_name: LFAInternalSharePoint
    transition: FilterFoldersByID
  - id: FilterFoldersByID
    type: code
    code:
      type: fixed
      value: |-
        input_id = str(alita_state.get('input_id', '')).strip()
        search_base_path = str(alita_state.get('search_base_path', '')).strip()
        all_files = alita_state.get('all_files', [])

        if not isinstance(all_files, list):
            all_files = []

        # Extract first-level subfolders that contain the ID
        found_folders = []
        found_folder_paths = set()

        for item in all_files:
            if not isinstance(item, dict):
                continue

            item_path = item.get('Path', '') or item.get('ServerRelativeUrl', '')

            if not item_path or not item_path.startswith(search_base_path):
                continue

            # Get the relative path after the base
            relative_path = item_path[len(search_base_path):].lstrip('/')
            path_parts = [p for p in relative_path.split('/') if p]

            # Only look at first segment (direct subfolder)
            if len(path_parts) > 0:
                first_folder = path_parts[0]

                # Check if this first-level folder contains the ID
                if input_id.lower() in first_folder.lower():
                    folder_path = f"{search_base_path}/{first_folder}"

                    # Only add if not already tracked
                    if folder_path not in found_folder_paths:
                        found_folder_paths.add(folder_path)
                        found_folders.append({
                            'Name': first_folder,
                            'Path': folder_path,
                            'Modified': str(item.get('Modified', '')),
                            'Created': str(item.get('Created', '')),
                            'Link': '',
                            'id': ''
                        })

        result = {'found_folders': found_folders}
        result
    input:
      - input_id
      - all_files
      - search_base_path
    output:
      - found_folders
    structured_output: true
    transition: ValidateFolderSearch
  - id: ValidateFolderSearch
    type: router
    condition: |
      {% if found_folders|length == 0 %}
        FolderSearchError
      {% elif found_folders|length > 1 %}
        FolderSearchError
      {% else %}
        LoadState
      {% endif %}
    default_output: FolderSearchError
    input:
      - found_folders
    routes:
      - FolderSearchError
      - LoadState
  - id: FolderSearchError
    type: code
    code:
      type: fixed
      value: |-
        input_id = alita_state.get('input_id', '')
        search_base_path = alita_state.get('search_base_path', '')
        found_folders = alita_state.get('found_folders', [])

        if len(found_folders) == 0:
            error_message = f"No folder found containing ID '{input_id}' in base path '{search_base_path}'."
        elif len(found_folders) > 1:
            folder_names = [f['Name'] for f in found_folders]
            error_message = f"Multiple folders found containing ID '{input_id}' in base path '{search_base_path}':\n" + "\n".join([f"  - {name}" for name in folder_names]) + "\n\nPlease provide a more specific ID or use direct folder_path."
        else:
            error_message = f"Internal error in folder search validation."

        report = f"❌ Failed to locate unique feature folder.\n\n**Error:** {error_message}\n\nPlease check the input and try again."

        msgs = list(alita_state.get('messages', []))
        msgs.append({"role": "assistant", "content": report})
        result = {"messages": msgs}
        result
    input:
      - input_id
      - search_base_path
      - found_folders
    output:
      - messages
    structured_output: true
    transition: END
  - id: LoadState
    type: code
    code:
      type: fixed
      value: |-
        import json

        # Extract folder_path from found_folders
        found_folders = alita_state.get('found_folders', [])
        folder_path = found_folders[0].get('Path', '')

        # Use input bucket_name if provided, otherwise use default from state
        input_bucket_name = alita_state.get('input_bucket_name', '').strip()
        default_bucket_name = alita_state.get('bucket_name')
        bucket_name = input_bucket_name if input_bucket_name else default_bucket_name

        store = alita_client.artifact(bucket_name)

        # Get input_id for file prefixing
        input_id = alita_state.get('input_id', '')
        file_prefix = f"{input_id}/" if input_id else ''

        # Check if reload is requested (force full content)
        reload = alita_state.get('reload', False)

        # Load retrieval log
        is_first_run = False
        last_retrieval_date = '1900-01-01T00:00:00'
        log_raw = store.get(f'{file_prefix}retrieval_log.txt')

        if log_raw and not any(err in str(log_raw).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
            lines = str(log_raw).strip().split('\n')
            if lines:
                # Parse last entry: "date" or "date|username"
                last_entry = lines[-1].strip()
                parts = last_entry.split('|', 1)
                last_retrieval_date = parts[0]  # Extract just the date
        else:
            is_first_run = True

        # Load snapshot (skip if reload=true to force full content)
        previous_snapshot = {}
        if not reload:
            snap_raw = store.get(f'{file_prefix}snapshot.json')
            if snap_raw and not any(err in str(snap_raw).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
                try:
                    previous_snapshot = json.loads(str(snap_raw))
                except json.JSONDecodeError:
                    pass

        {
            'folder_path': folder_path,
            'bucket_name': bucket_name,
            'last_retrieval_date': last_retrieval_date,
            'is_first_run': is_first_run,
            'previous_snapshot': previous_snapshot,
            'file_prefix': file_prefix
        }
    input:
      - found_folders
      - input_bucket_name
      - input_id
      - reload
    output:
      - folder_path
      - bucket_name
      - last_retrieval_date
      - is_first_run
      - previous_snapshot
      - file_prefix
    structured_output: true
    transition: GetFilesFromSharepoint
  - id: FormatError
    type: code
    code:
      type: fixed
      value: |-
        error_message = alita_state.get('error_message', '')

        report = f"❌ Failed to process request.\n\n**Error:** {error_message}\n\nPlease check the input and try again."

        msgs = list(alita_state.get('messages', []))
        msgs.append({"role": "assistant", "content": report})
        result = {"messages": msgs}
        result
    input:
      - error_message
    output:
      - messages
    structured_output: true
    transition: END
  - id: GetFilesFromSharepoint
    type: toolkit
    input:
      - folder_path
    input_mapping:
      folder_name:
        type: variable
        value: folder_path
      form_name:
        type: fixed
        value: null
      include_extensions:
        type: fixed
        value: null
      limit_files:
        type: fixed
        value: 10000
      skip_extensions:
        type: fixed
        value: null
    output:
      - all_files
    structured_output: true
    tool: get_files_list
    toolkit_name: LFAInternalSharePoint
    transition: CheckToolkitErrorAfterGetFiles
  - id: CheckToolkitErrorAfterGetFiles
    type: code
    code:
      type: fixed
      value: |-
        all_files = alita_state.get('all_files', [])
        error_detected = False
        error_message = ''

        # Check for toolkit errors (returned as string or dict with error)
        if isinstance(all_files, str) and ('Traceback' in all_files or 'Error' in all_files):
            error_detected = True
            error_message = all_files[:1000]
        elif isinstance(all_files, dict) and 'error' in all_files:
            error_detected = True
            error_message = str(all_files.get('error', ''))[:1000]

        result = {'all_files': all_files, 'error_detected': error_detected, 'error_message': error_message}
        result
    input:
      - all_files
    output:
      - all_files
      - error_detected
      - error_message
    structured_output: true
    transition: RouterAfterGetFiles
  - id: RouterAfterGetFiles
    type: router
    condition: |
      {% if error_detected %}
        FormatError
      {% else %}
        CompareSnapshots
      {% endif %}
    default_output: FormatError
    input:
      - error_detected
    routes:
      - FormatError
      - CompareSnapshots
  - id: CompareSnapshots
    type: code
    code:
      type: fixed
      value: |-
        import re
        from datetime import datetime

        all_files = alita_state.get('all_files', [])
        previous_snapshot = alita_state.get('previous_snapshot', {})
        last_retrieval_date = alita_state.get('last_retrieval_date', '')

        def sanitize_name(name):
            safe = re.sub(r'[^\w\-]', '_', name.replace(' ', '-'))
            return re.sub(r'-+', '-', safe)

        # Create current snapshot: {path: {metadata}}
        current_snapshot = {}
        for file in all_files:
            if isinstance(file, dict):
                path = (file.get('Path', '') or
                       file.get('ServerRelativeUrl', '') or
                       file.get('FileRef', '') or
                       file.get('FileSystemObjectType', '') or
                       file.get('Url', ''))

                if path:
                    name = file.get('Name', '')
                    current_snapshot[path] = {
                        'Name': name,
                        'safe_name': sanitize_name(name),
                        'Modified': file.get('Modified', ''),
                        'Created': file.get('Created', ''),
                        'Link': file.get('Link', ''),
                        'id': file.get('id', '')
                    }

        # Parse last retrieval date
        try:
            last_date = datetime.fromisoformat(last_retrieval_date.replace('Z', ''))
        except:
            last_date = datetime(1900, 1, 1)

        # Identify changes
        new_files = []
        removed_files = []
        changed_files = []
        unchanged_count = 0

        current_paths = set(current_snapshot.keys())
        previous_paths = set(previous_snapshot.keys())

        # New files
        for path in current_paths - previous_paths:
            new_files.append({'Path': path, **current_snapshot[path]})

        # Removed files
        for path in previous_paths - current_paths:
            meta = previous_snapshot[path]
            if 'safe_name' not in meta:
                meta = {**meta, 'safe_name': sanitize_name(meta.get('Name', ''))}
            removed_files.append({'Path': path, **meta})

        # Changed or unchanged files
        for path in current_paths & previous_paths:
            current_modified = current_snapshot[path].get('Modified', '')
            previous_modified = previous_snapshot[path].get('Modified', '')

            if current_modified != previous_modified:
                try:
                    current_mod_dt = datetime.fromisoformat(current_modified.replace('Z', '').split('+')[0].split('.')[0])
                    if current_mod_dt > last_date:
                        changed_files.append({
                            'Path': path,
                            'PreviousModified': previous_modified,
                            'CurrentModified': current_modified,
                            **current_snapshot[path]
                        })
                    else:
                        unchanged_count += 1
                except:
                    unchanged_count += 1
            else:
                unchanged_count += 1

        {
            'current_snapshot': current_snapshot,
            'new_files': new_files,
            'removed_files': removed_files,
            'changed_files': changed_files,
            'unchanged_count': unchanged_count
        }
    input:
      - all_files
      - previous_snapshot
      - last_retrieval_date
    output:
      - current_snapshot
      - new_files
      - removed_files
      - changed_files
      - unchanged_count
    structured_output: true
    transition: SaveState
  - id: SaveState
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        from datetime import datetime

        bucket_name = alita_state.get('bucket_name')
        store = alita_client.artifact(bucket_name)
        file_prefix = alita_state.get('file_prefix', '')

        current_retrieval_date_raw = alita_state.get('current_retrieval_date', '')
        last_retrieval_date = alita_state.get('last_retrieval_date', '')
        current_snapshot = alita_state.get('current_snapshot', {})
        new_files = alita_state.get('new_files', [])
        removed_files = alita_state.get('removed_files', [])
        changed_files = alita_state.get('changed_files', [])
        username = alita_state.get('username', 'unknown')
        input_id = alita_state.get('input_id', '')

        # Truncate microseconds from current_retrieval_date for consistency
        # This ensures retrieval_log timestamps match changes_*.json filenames
        dt = datetime.fromisoformat(current_retrieval_date_raw.replace('Z', ''))
        current_retrieval_date = dt.strftime('%Y-%m-%dT%H:%M:%S')

        # 1. Load existing retrieval log to track removals
        old_log_lines = []
        log_raw = store.get(f'{file_prefix}retrieval_log.txt')
        if log_raw and not any(err in str(log_raw).lower() for err in ['error', 'not found', 'does not exist', 'failed']):
            old_log_lines = [line.strip() for line in str(log_raw).strip().split('\n') if line.strip()]

        # 2. Build new log entry with username: "YYYY-MM-DDTHH:MM:SS|username"
        log_entry = f"{current_retrieval_date}|{username}"

        # 3. Build new log (keep last 5 entries)
        # Start with all existing log lines, append new entry, then keep last 5
        log_lines = old_log_lines.copy()
        log_lines.append(log_entry)
        log_lines = log_lines[-5:]

        # 4. Identify dates being removed (dates in old_log but not in new log)
        dates_to_remove = set(old_log_lines) - set(log_lines)

        # 5. Delete corresponding changes_*.json and joined_files_*.txt files for removed dates
        for removed_entry in dates_to_remove:
            # Parse entry: "date" or "date|username"
            parts = removed_entry.split('|', 1)
            removed_date = parts[0]
            removed_user = parts[1] if len(parts) > 1 else ''
            
            # Parse ISO date and convert to filename format
            dt_removed = datetime.fromisoformat(removed_date.replace('Z', ''))
            timestamp_str = dt_removed.strftime('%Y%m%d_%H%M%S')
            
            # Delete changes file
            if removed_user:
                changes_filename_to_delete = f"{file_prefix}changes_{timestamp_str}_{removed_user}.json"
            else:
                changes_filename_to_delete = f"{file_prefix}changes_{timestamp_str}.json"
            
            try:
                store.delete(changes_filename_to_delete, check_exists=False)
            except Exception as e:
                if 'getReader' not in str(e):
                    error_log = f"[DELETION FAILED]\nTarget: {changes_filename_to_delete}\nLog Entry: {removed_entry}\nError: {str(e)}\nCurrent time: {current_retrieval_date}"
                    try:
                        store.create(f"{file_prefix}error_deletion_{timestamp_str}_{removed_user if removed_user else 'unknown'}.txt", error_log)
                    except:
                        pass
            
            # Joined file cleanup removed - file is overwritten each run (not timestamp-based)

        # 5. Save updated retrieval log
        r = store.create(f'{file_prefix}retrieval_log.txt', '\n'.join(log_lines))

        # 6. Save snapshot to main bucket only
        snapshot_json = json.dumps(current_snapshot, indent=2, ensure_ascii=False)
        r = store.create(f'{file_prefix}snapshot.json', snapshot_json)

        # 7. Enhance file entries with artifact storage filenames
        def add_artifact_filenames(files, file_type):
            enhanced_files = []
            for file in files:
                file_id = file.get('id', '')
                file_name = file.get('Name', '')
                enhanced_file = dict(file)
                
                if file_id and file_name:
                    # Sanitize: spaces to hyphens, special chars to underscores
                    safe_name = re.sub(r'[^\w\-]', '_', file_name.replace(' ', '-'))
                    safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
                    enhanced_file['artifact_storage'] = {
                        'current': f"{file_prefix}file_{file_id}_{safe_name}.txt"
                    }
                    
                    if file_type == 'changed':
                        enhanced_file['artifact_storage']['previous'] = f"{file_prefix}file_prev_{file_id}_{safe_name}.txt"
                        enhanced_file['artifact_storage']['diff'] = f"{file_prefix}file_diff_{file_id}_{safe_name}.txt"
                    elif file_type == 'removed':
                        enhanced_file['artifact_storage']['deleted'] = f"{file_prefix}file_del_{file_id}_{safe_name}.txt"
                
                enhanced_files.append(enhanced_file)
            return enhanced_files

        enhanced_new_files = add_artifact_filenames(new_files, 'new')
        enhanced_removed_files = add_artifact_filenames(removed_files, 'removed')
        enhanced_changed_files = add_artifact_filenames(changed_files, 'changed')

        # 8. Save changes report with artifact filenames
        # Use truncated timestamp (already parsed from current_retrieval_date) to match retrieval_log
        # Include username in filename: changes_YYYYMMDD_HHMMSS_username.json
        timestamp = dt.strftime('%Y%m%d_%H%M%S')
        changes_filename = f"{file_prefix}changes_{timestamp}_{username}.json"
        changes_data = {
            'retrieval_date': current_retrieval_date,
            'username': username,
            'summary': {
                'new_files_count': len(new_files),
                'removed_files_count': len(removed_files),
                'changed_files_count': len(changed_files)
            },
            'new_files': enhanced_new_files,
            'removed_files': enhanced_removed_files,
            'changed_files': enhanced_changed_files
        }
        r = store.create(changes_filename, json.dumps(changes_data, indent=2, ensure_ascii=False))

        {'changes_filename': changes_filename}
    input:
      - bucket_name
      - current_retrieval_date
      - last_retrieval_date
      - current_snapshot
      - new_files
      - removed_files
      - changed_files
      - username
      - file_prefix
      - input_id
    output:
      - changes_filename
    structured_output: true
    transition: PrepareVersioning
  - id: PrepareVersioning
    type: code
    code:
      type: fixed
      value: |-
        changed_files = alita_state.get('changed_files', [])
        removed_files = alita_state.get('removed_files', [])
        new_files = alita_state.get('new_files', [])

        files_to_version = [
            {'id': f['id'], 'name': f['safe_name'], 'type': 'changed'}
            for f in changed_files if f.get('id') and f.get('safe_name')
        ]

        files_to_delete = [
            {'id': f['id'], 'name': f['safe_name'], 'type': 'removed'}
            for f in removed_files if f.get('id') and f.get('safe_name')
        ]

        files_to_archive = [
            {'id': f['id'], 'name': f['safe_name'], 'path': f['Path'], 'type': 'new' if f in new_files else 'changed'}
            for f in new_files + changed_files if f.get('id') and f.get('safe_name') and f.get('Path')
        ]

        {
            'files_to_version': files_to_version,
            'files_to_delete': files_to_delete,
            'files_to_archive': files_to_archive,
            'current_version_index': 0,
            'current_deletion_index': 0,
            'current_archive_index': 0
        }
    input:
      - changed_files
      - removed_files
      - new_files
    output:
      - files_to_version
      - files_to_delete
      - files_to_archive
      - current_version_index
      - current_deletion_index
      - current_archive_index
    structured_output: true
    transition: CheckVersioningNeeded
  - id: CheckVersioningNeeded
    type: router
    condition: |
      {% if current_version_index|int < files_to_version|length %}
        VersionFileAndAdvance
      {% else %}
        CheckRemovalNeeded
      {% endif %}
    default_output: CheckRemovalNeeded
    input:
      - current_version_index
      - files_to_version
    routes:
      - VersionFileAndAdvance
      - CheckRemovalNeeded
  - id: VersionFileAndAdvance
    type: code
    code:
      type: fixed
      value: |-
        files_to_version = alita_state.get('files_to_version', [])
        idx_raw = alita_state.get('current_version_index', 0)

        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        if 0 <= idx < len(files_to_version):
            f = files_to_version[idx]
            file_id = f.get('id', '')
            file_name = f.get('name', 'unknown')

            bucket_name = alita_state.get('bucket_name')
            file_prefix = alita_state.get('file_prefix', '')
            store = alita_client.artifact(bucket_name)
            src = f"{file_prefix}file_{file_id}_{file_name}.txt"
            dst = f"{file_prefix}file_prev_{file_id}_{file_name}.txt"

            content = store.get(src)
            is_error = not content or (isinstance(content, dict) and 'error' in content)

            if not is_error:
                try:
                    store.create(dst, content)
                except:
                    pass
            else:
                placeholder = f"[NO PREVIOUS VERSION]\nFile: {file_name}\nID: {file_id}\nSource: {src}"
                try:
                    store.create(dst, placeholder)
                except:
                    pass

        {'current_version_index': idx + 1}
    input:
      - bucket_name
      - files_to_version
      - current_version_index
      - file_prefix
    output:
      - current_version_index
    structured_output: true
    transition: CheckVersioningNeeded
  - id: CheckRemovalNeeded
    type: router
    condition: |
      {% if current_deletion_index|int < files_to_delete|length %}
        CleanupRemovedFileAndAdvance
      {% else %}
        CheckDownloadNeeded
      {% endif %}
    default_output: CheckDownloadNeeded
    input:
      - current_deletion_index
      - files_to_delete
    routes:
      - CleanupRemovedFileAndAdvance
      - CheckDownloadNeeded
  - id: CleanupRemovedFileAndAdvance
    type: code
    code:
      type: fixed
      value: |-
        files_to_delete = alita_state.get('files_to_delete', [])
        idx_raw = alita_state.get('current_deletion_index', 0)

        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        if 0 <= idx < len(files_to_delete):
            f = files_to_delete[idx]
            file_id = f.get('id', '')
            file_name = f.get('name', 'unknown')

            bucket_name = alita_state.get('bucket_name')
            file_prefix = alita_state.get('file_prefix', '')
            store = alita_client.artifact(bucket_name)

            src = f"{file_prefix}file_{file_id}_{file_name}.txt"
            dst = f"{file_prefix}file_del_{file_id}_{file_name}.txt"

            content = store.get(src)
            is_error = not content or (isinstance(content, dict) and 'error' in content)

            if not is_error:
                store.create(dst, content)
                try:
                    store.delete(src, check_exists=False)
                except:
                    pass

            # Cleanup prev and diff files
            for suffix in ['prev', 'diff']:
                try:
                    store.delete(f"{file_prefix}file_{suffix}_{file_id}_{file_name}.txt", check_exists=False)
                except:
                    pass

        {'current_deletion_index': idx + 1}
    input:
      - bucket_name
      - files_to_delete
      - current_deletion_index
      - file_prefix
    output:
      - current_deletion_index
    structured_output: true
    transition: CheckRemovalNeeded
  - id: CheckDownloadNeeded
    type: router
    condition: |
      {% if current_archive_index|int < files_to_archive|length %}
        PrepareDownload
      {% else %}
        PrepareDiffComputation
      {% endif %}
    default_output: PrepareDiffComputation
    input:
      - current_archive_index
      - files_to_archive
    routes:
      - PrepareDownload
      - PrepareDiffComputation
  - id: PrepareDownload
    type: code
    code:
      type: fixed
      value: |-
        files_to_archive = alita_state.get('files_to_archive', [])
        idx_raw = alita_state.get('current_archive_index', 0)

        # Defensive: ensure idx is valid integer
        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        # Defensive: ensure idx is within bounds
        if idx < 0 or idx >= len(files_to_archive):
            idx = 0

        # Get file path
        file_path = ''
        if files_to_archive and idx < len(files_to_archive):
            file_path = files_to_archive[idx].get('path', '')

        {'current_file_path': file_path}
    input:
      - files_to_archive
      - current_archive_index
    output:
      - current_file_path
    structured_output: true
    transition: DownloadFileContent
  - id: DownloadFileContent
    type: toolkit
    input:
      - current_file_path
    input_mapping:
      is_capture_image:
        type: fixed
        value: false
      page_number:
        type: fixed
        value: null
      path:
        type: variable
        value: current_file_path
      sheet_name:
        type: fixed
        value: null
    output:
      - downloaded_content
    structured_output: true
    tool: read_document
    toolkit_name: LFAInternalSharePoint
    transition: SaveFileAndAdvance
  - id: SaveFileAndAdvance
    type: code
    code:
      type: fixed
      value: |-
        files_to_archive = alita_state.get('files_to_archive', [])
        idx_raw = alita_state.get('current_archive_index', 0)
        content = alita_state.get('downloaded_content', '')
        bucket_name = alita_state.get('bucket_name')

        # Defensive: ensure idx is valid integer
        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        # Defensive: validate index bounds
        if idx >= 0 and idx < len(files_to_archive):
            current_file = files_to_archive[idx]
            file_id = current_file.get('id', 'unknown')
            file_name = current_file.get('name', 'unknown')
            file_type = current_file.get('type', 'unknown')
            file_prefix = alita_state.get('file_prefix', '')

            filename = f"{file_prefix}file_{file_id}_{file_name}.txt"
            content_str = str(content) if content else ''

            try:
                store = alita_client.artifact(bucket_name)
                result = store.create(filename, content_str)

                # If bucket doesn't exist, create it and retry
                if isinstance(result, dict) and 'error' in result:
                    error_msg = result.get('error', '')
                    if 'does not exist' in error_msg.lower():
                        store.create('.bucket_init', f'Bucket initialized: {bucket_name}')
                        store.create(filename, content_str)
            except Exception as e:
                # Create error marker file
                error_msg = f"[ERROR SAVING FILE]\nFilename: {file_name}\nID: {file_id}\nType: {file_type}\nError: {str(e)}\nContent length: {len(content_str)}\nTimestamp: {__import__('datetime').datetime.now().isoformat()}"
                try:
                    alita_client.artifact(bucket_name).create(f"{file_prefix}error_download_{file_id}_{file_name}.txt", error_msg)
                except:
                    pass

        {'current_archive_index': idx + 1}
    input:
      - bucket_name
      - files_to_archive
      - current_archive_index
      - downloaded_content
      - file_prefix
    output:
      - current_archive_index
    structured_output: true
    transition: CheckDownloadNeeded
  - id: PrepareDiffComputation
    type: code
    code:
      type: fixed
      value: |-
        changed_files = alita_state.get('changed_files', [])

        files_to_diff = [
            {'id': f['id'], 'name': f['safe_name'], 'original_name': f['Name']}
            for f in changed_files if f.get('id') and f.get('safe_name')
        ]

        {'files_to_diff': files_to_diff, 'current_diff_index': 0}
    input:
      - changed_files
    output:
      - files_to_diff
      - current_diff_index
    structured_output: true
    transition: CheckDiffNeeded
  - id: CheckDiffNeeded
    type: router
    condition: |
      {% if current_diff_index|int < files_to_diff|length %}
        ComputeDiffAndAdvance
      {% else %}
        CheckChangesExist
      {% endif %}
    default_output: CheckChangesExist
    input:
      - current_diff_index
      - files_to_diff
    routes:
      - ComputeDiffAndAdvance
      - CheckChangesExist
  - id: CheckChangesExist
    type: router
    condition: |
      {% if new_files|length > 0 or changed_files|length > 0 or removed_files|length > 0 %}
        CreateJoinedFile
      {% else %}
        FormatEnhancedOutput
      {% endif %}
    default_output: FormatEnhancedOutput
    input:
      - new_files
      - changed_files
      - removed_files
    routes:
      - CreateJoinedFile
      - FormatEnhancedOutput
  - id: ComputeDiffAndAdvance
    type: code
    code:
      type: fixed
      value: |-
        import difflib

        files_to_diff = alita_state.get('files_to_diff', [])
        idx_raw = alita_state.get('current_diff_index', 0)

        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        if 0 <= idx < len(files_to_diff):
            f = files_to_diff[idx]
            file_id, file_name, original_name = f.get('id', ''), f.get('name', ''), f.get('original_name', '')

            bucket_name = alita_state.get('bucket_name')
            file_prefix = alita_state.get('file_prefix', '')
            store = alita_client.artifact(bucket_name)

            curr_path = f"{file_prefix}file_{file_id}_{file_name}.txt"
            prev_path = f"{file_prefix}file_prev_{file_id}_{file_name}.txt"
            diff_path = f"{file_prefix}file_diff_{file_id}_{file_name}.txt"

            curr_raw = store.get(curr_path)
            prev_raw = store.get(prev_path)

            def get_content(raw):
                if not raw or (isinstance(raw, dict) and 'error' in raw):
                    return ''
                return str(raw)

            curr_content = get_content(curr_raw)
            prev_content = get_content(prev_raw)

            if curr_content and prev_content and '[NO PREVIOUS VERSION]' not in prev_content:
                diff = difflib.unified_diff(
                    prev_content.splitlines(keepends=True),
                    curr_content.splitlines(keepends=True),
                    fromfile=f'{original_name} (previous)',
                    tofile=f'{original_name} (current)',
                    lineterm='\n'
                )
                diff_text = ''.join(diff)
                lines_changed = sum(1 for line in diff_text.split('\n') if line.startswith(('+', '-')))
                diff_output = f"# Diff: {original_name}\n# Lines changed: {lines_changed}\n\n{diff_text}"
                try:
                    store.create(diff_path, diff_output)
                except:
                    pass
            else:
                reason = "Current file not found" if not curr_content else "Previous file not found" if not prev_content else "No previous version"
                try:
                    store.create(diff_path, f"[NO DIFF]\nFile: {original_name}\nReason: {reason}")
                except:
                    pass

        {'current_diff_index': idx + 1}
    input:
      - bucket_name
      - files_to_diff
      - current_diff_index
      - file_prefix
    output:
      - current_diff_index
    structured_output: true
    transition: CheckDiffNeeded
  - id: FormatEnhancedOutput
    type: code
    code:
      type: fixed
      value: |-
        folder_path = alita_state.get('folder_path', '')
        current_retrieval_date = alita_state.get('current_retrieval_date', '')
        last_retrieval_date = alita_state.get('last_retrieval_date', '')
        changes_filename = alita_state.get('changes_filename', '')
        username = alita_state.get('username', 'unknown')

        new_files = alita_state.get('new_files', [])
        removed_files = alita_state.get('removed_files', [])
        changed_files = alita_state.get('changed_files', [])
        unchanged_count = alita_state.get('unchanged_count', 0)
        files_to_version = alita_state.get('files_to_version', [])
        files_to_delete = alita_state.get('files_to_delete', [])
        files_to_archive = alita_state.get('files_to_archive', [])
        files_to_diff = alita_state.get('files_to_diff', [])

        report_lines = [
            "# 📊 SharePoint Change Tracker Report",
            "",
            f"**Folder:** `{folder_path}`",
            f"**Run by:** `{username}`",
            f"**Current Retrieval:** `{current_retrieval_date}`",
            f"**Last Retrieval:** `{last_retrieval_date}`",
            "",
            "## 📈 Summary",
            "",
            f"- **New Files:** {len(new_files)}",
            f"- **Removed Files:** {len(removed_files)}",
            f"- **Changed Files:** {len(changed_files)}",
            f"- **Unchanged Files:** {unchanged_count}",
            f"- **Total Files:** {len(new_files) + len(changed_files) + unchanged_count}",
            f"- **Files Versioned (prev saved):** {len(files_to_version)}",
            f"- **Files Cleaned Up (deleted):** {len(files_to_delete)}",
            f"- **Files Downloaded (new + changed):** {len(files_to_archive)}",
            f"- **Diffs Computed:** {len(files_to_diff)}",
            "",
        ]

        if new_files:
            report_lines.extend(["## ✨ New Files", "", f"**📥 Downloaded & Stored:** {len([f for f in files_to_archive if f.get('type') == 'new'])} files", ""])
            for idx, f in enumerate(sorted(new_files, key=lambda x: x.get('Modified', ''), reverse=True), 1):
                report_lines.extend([
                    f"### {idx}. {f.get('Name', 'Unknown')}",
                    f"- **Path:** `{f.get('Path', '')}`",
                    f"- **Created:** `{f.get('Modified', '')}`",
                    f"- **Stored as:** `file_{f.get('id', 'unknown')}_{f.get('safe_name', '')}.txt`"
                ])
                if f.get('Link'): report_lines.append(f"- **Link:** {f['Link']}")
                report_lines.append("")

        if removed_files:
            report_lines.extend(["## 🗑️ Removed Files", "", f"**💾 Last State Preserved:** {len(files_to_delete)} files (renamed to file_del_*)", ""])
            for idx, f in enumerate(sorted(removed_files, key=lambda x: x.get('Modified', ''), reverse=True), 1):
                report_lines.extend([
                    f"### {idx}. {f.get('Name', 'Unknown')}",
                    f"- **Path:** `{f.get('Path', '')}`",
                    f"- **Last Modified:** `{f.get('Modified', '')}`",
                    f"- **Archived as:** `file_del_{f.get('id', 'unknown')}_{f.get('safe_name', '')}.txt`",
                    ""
                ])

        if changed_files:
            report_lines.extend(["## 🔄 Changed Files", "", f"**📦 Both Versions Stored:** {len([f for f in files_to_version if f.get('type') == 'changed'])} files (current + previous)", ""])
            for idx, f in enumerate(sorted(changed_files, key=lambda x: x.get('CurrentModified', ''), reverse=True), 1):
                fid, sn = f.get('id', 'unknown'), f.get('safe_name', '')
                report_lines.extend([
                    f"### {idx}. {f.get('Name', 'Unknown')}",
                    f"- **Path:** `{f.get('Path', '')}`",
                    f"- **Previous Modified:** `{f.get('PreviousModified', '')}`",
                    f"- **Current Modified:** `{f.get('CurrentModified', '')}`",
                    f"- **Current version:** `file_{fid}_{sn}.txt`",
                    f"- **Previous version:** `file_prev_{fid}_{sn}.txt`",
                    f"- **Diff:** `file_diff_{fid}_{sn}.txt`"
                ])
                if f.get('Link'): report_lines.append(f"- **Link:** {f['Link']}")
                report_lines.append("")

        # No changes
        if not new_files and not removed_files and not changed_files:
            is_first_run = alita_state.get('is_first_run', False)
            if is_first_run:
                report_lines.append("ℹ️ **First run** - Baseline snapshot created in artifact storage.")
            else:
                report_lines.append("✅ **No changes detected** since last retrieval.")

        # Footer
        bucket_name = alita_state.get('bucket_name', '')
        joined_filename = alita_state.get('joined_filename', '')
        joined_status = alita_state.get('joined_status', '')

        report_lines.extend([
            "",
            "---",
            "",
            "## 📂 Artifact Storage",
            f"**Bucket:** `{bucket_name}`",
            "",
            "- `retrieval_log.txt` — run history (last 5, auto-cleanup)",
            "- `snapshot.json` — current file state",
        ])

        if changes_filename:
            report_lines.append(f"- `{changes_filename}` — this run's change report (with artifact filenames)")
        else:
            report_lines.append("- `changes_YYYYMMDD_HHMMSS_username.json` — per-run change report (last 5 kept, auto-cleanup)")

        # Only mention context file if it was created (i.e., if there were changes)
        if joined_filename:
            report_lines.append(f"- `{joined_filename}` — combined file report (new + changed files, updated this run)")

        report_lines.extend([
            "- `file_[Id]_[name].txt` — current file versions",
            "- `file_prev_[Id]_[name].txt` — previous versions of changed files",
            "- `file_diff_[Id]_[name].txt` — unified diffs for changed files",
            "- `file_del_[Id]_[name].txt` — last known state of removed files",
        ])

        # Add joined file status
        if joined_status:
            report_lines.extend([
                "",
                "### 📄 Joined File",
                f"{joined_status}",
            ])

        report = "\n".join(report_lines)

        msgs = list(alita_state.get('messages', []))
        msgs.append({"role": "assistant", "content": report})

        {'messages': msgs}
    input:
      - bucket_name
      - folder_path
      - current_retrieval_date
      - last_retrieval_date
      - changes_filename
      - username
      - input_id
      - new_files
      - removed_files
      - changed_files
      - unchanged_count
      - is_first_run
      - files_to_version
      - files_to_delete
      - files_to_archive
      - files_to_diff
      - joined_filename
      - joined_status
    output:
      - messages
    structured_output: true
    transition: END
  - id: CreateJoinedFile
    type: code
    code:
      type: fixed
      value: |-
        bucket_name = alita_state.get('bucket_name')
        store = alita_client.artifact(bucket_name)
        file_prefix = alita_state.get('file_prefix', '')

        new_files = alita_state.get('new_files', [])
        changed_files = alita_state.get('changed_files', [])
        current_snapshot = alita_state.get('current_snapshot', {})
        current_retrieval_date = alita_state.get('current_retrieval_date', '')
        username = alita_state.get('username', 'unknown')
        input_id = alita_state.get('input_id', '')

        def get_content(store, filename):
            try:
                content = store.get(filename)
                if content and not (isinstance(content, dict) and 'error' in content):
                    return str(content)
            except:
                pass
            return "[Content not available]"

        diff_filename = f"{input_id}_sp_diff__{username}.md" if username else f"{input_id}_sp_diff.md"

        sections = ["=" * 80, f"SharePoint Combined Files Report", f"Generated: {current_retrieval_date}", "=" * 80, ""]

        if new_files:
            sections.extend(["\n" + "=" * 80, f"NEW FILES ({len(new_files)} files)", "=" * 80 + "\n"])
            for f in new_files:
                artifact = f"{file_prefix}file_{f.get('id', '')}_{f.get('safe_name', '')}.txt"
                sections.extend(["\n" + "-" * 80, f"File: {f.get('Name', '')}", f"Path: {f.get('Path', '')}", f"Modified: {f.get('Modified', '')}", "-" * 80, get_content(store, artifact), ""])

        if changed_files:
            sections.extend(["\n" + "=" * 80, f"CHANGED FILES ({len(changed_files)} files) - DIFFS ONLY", "=" * 80 + "\n"])
            for f in changed_files:
                diff_artifact = f"{file_prefix}file_diff_{f.get('id', '')}_{f.get('safe_name', '')}.txt"
                sections.extend(["\n" + "-" * 80, f"File: {f.get('Name', '')}", f"Path: {f.get('Path', '')}", f"Previous: {f.get('PreviousModified', '')}", f"Current: {f.get('CurrentModified', '')}", "-" * 80, get_content(store, diff_artifact), ""])

        sections.extend(["\n" + "=" * 80, "END OF REPORT", "=" * 80])
        diff_content = "\n".join(sections)

        context_filename = f"{input_id}_sp_context__{username}.md" if username else f"{input_id}_sp_context.md"
        ctx = ["=" * 80, f"SharePoint Context - Full Snapshot", f"Generated: {current_retrieval_date}", f"Total files: {len(current_snapshot)}", "=" * 80, ""]

        for idx, (path, meta) in enumerate(sorted(current_snapshot.items()), 1):
            fid, sn = meta.get('id', ''), meta.get('safe_name', '')
            if not fid or not sn:
                continue
            artifact = f"{file_prefix}file_{fid}_{sn}.txt"
            ctx.extend(["\n" + "-" * 80, f"File {idx}/{len(current_snapshot)}: {meta.get('Name', '')}", f"Path: {path}", f"Modified: {meta.get('Modified', '')}", "-" * 80, get_content(store, artifact), ""])

        ctx.extend(["\n" + "=" * 80, "END OF SNAPSHOT", "=" * 80])
        context_content = "\n".join(ctx)

        joined_status = ''
        try:
            # Save context file (full snapshot) to sp-repo
            sp_repo_context_filename = f"{file_prefix}{context_filename}"
            store.create(sp_repo_context_filename, context_content)
            joined_status = f"✅ Created `{sp_repo_context_filename}` (context) in sp-repo ({len(context_content)} bytes)"
            
            # Also save to ba-user-stories bucket (no prefix, root level)
            ba_store = alita_client.artifact('ba-user-stories')
            
            # Save diff file (incremental changes)
            ba_store.create(diff_filename, diff_content)
            joined_status += f" + `{diff_filename}` (diff)"
            
            # Save context file (full snapshot - main file)
            ba_store.create(context_filename, context_content)
            joined_status += f" + `{context_filename}` (context) in ba-user-stories"
        except Exception as e:
            joined_status = f"❌ Error: {str(e)}"
            context_filename = f"error_{context_filename}"

        {'joined_filename': sp_repo_context_filename if 'sp_repo_context_filename' in locals() else context_filename, 'joined_status': joined_status}
    input:
      - bucket_name
      - new_files
      - changed_files
      - current_snapshot
      - current_retrieval_date
      - username
      - input_id
      - file_prefix
    output:
      - joined_filename
      - joined_status
    structured_output: true
    transition: FormatEnhancedOutput
