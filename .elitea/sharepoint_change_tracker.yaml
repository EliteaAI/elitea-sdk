    structured_output: true
    transition: PrepareVersioning
  - id: PrepareVersioning
    type: code
    code:
      type: fixed
      value: |-
        import re

        changed_files = alita_state.get('changed_files', [])
        removed_files = alita_state.get('removed_files', [])
        new_files = alita_state.get('new_files', [])

        # Prepare list of changed files that need previous version saved
        files_to_version = []

        for file in changed_files:
            file_id = file.get('id', '')
            file_name = file.get('Name', '')
            
            if file_id and file_name:
                # Sanitize: spaces to hyphens, special chars to underscores
                safe_name = re.sub(r'[^\w\-]', '_', file_name.replace(' ', '-'))
                safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
                files_to_version.append({
                    'id': file_id,
                    'name': safe_name,
                    'type': 'changed'
                })

        # Prepare list of removed files for cleanup
        files_to_delete = []

        for file in removed_files:
            file_id = file.get('id', '')
            file_name = file.get('Name', '')
            
            if file_id and file_name:
                # Sanitize: spaces to hyphens, special chars to underscores
                safe_name = re.sub(r'[^\w\-]', '_', file_name.replace(' ', '-'))
                safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
                files_to_delete.append({
                    'id': file_id,
                    'name': safe_name,
                    'type': 'removed'
                })

        # Prepare list of files to download (new + changed)
        files_to_download = []

        for file in new_files + changed_files:
            file_id = file.get('id', '')
            file_name = file.get('Name', '')
            file_path = file.get('Path', '')
            
            if not file_id or not file_name or not file_path:
                continue
            
            # Sanitize: spaces to hyphens, special chars to underscores
            safe_name = re.sub(r'[^\w\-]', '_', file_name.replace(' ', '-'))
            safe_name = re.sub(r'-+', '-', safe_name)  # Normalize consecutive hyphens
            files_to_download.append({
                'id': file_id,
                'name': safe_name,
                'path': file_path,
                'type': 'new' if file in new_files else 'changed'
            })

        {
            'files_to_version': files_to_version,
            'files_to_delete': files_to_delete,
            'files_to_archive': files_to_download,
            'current_version_index': 0,
            'current_deletion_index': 0,
            'current_archive_index': 0
        }
    input:
      - changed_files
      - removed_files
      - new_files
    output:
      - files_to_version
      - files_to_delete
      - files_to_archive
      - current_version_index
      - current_deletion_index
      - current_archive_index
    structured_output: true
    transition: CheckVersioningNeeded
  - id: CheckVersioningNeeded
    type: router
    condition: |
      {% if current_version_index|int < files_to_version|length %}
        VersionFileAndAdvance
      {% else %}
        CheckRemovalNeeded
      {% endif %}
    default_output: CheckRemovalNeeded
    input:
      - current_version_index
      - files_to_version
    routes:
      - VersionFileAndAdvance
      - CheckRemovalNeeded
  - id: VersionFileAndAdvance
    type: code
    code:
      type: fixed
      value: |-
        files_to_version = alita_state.get('files_to_version', [])
        idx_raw = alita_state.get('current_version_index', 0)

        # Defensive: ensure idx is valid integer
        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        # Defensive: validate index and process file
        if idx >= 0 and idx < len(files_to_version):
            f = files_to_version[idx]
            file_id = f.get('id', '')
            file_name = f.get('name', 'unknown')
            file_type = f.get('type', 'unknown')

            bucket_name = alita_state.get('bucket_name')
            file_prefix = alita_state.get('file_prefix', '')
            store = alita_client.artifact(bucket_name)
            src = f"{file_prefix}file_{file_id}_{file_name}.txt"
            dst = f"{file_prefix}file_prev_{file_id}_{file_name}.txt"

            # Try to get existing file content
            content = store.get(src)
            
            # More specific error detection to avoid false positives in file content
            def is_error_response(content):
                if not content:
                    return True
                if isinstance(content, dict) and 'error' in content:
                    return True
                content_str = str(content).strip()
                # Only check short responses for error patterns at the start
                if len(content_str) < 500:
                    content_lower = content_str.lower()
                    if content_lower.startswith('error') or content_lower.startswith('file not found') or content_lower.startswith('does not exist'):
                        return True
                return False
            
            if not is_error_response(content):
                # Save previous version
                try:
                    store.create(dst, content)
                except Exception as e:
                    # Log error but continue - create marker file
                    error_msg = f"[ERROR CREATING PREVIOUS VERSION]\nSource: {src}\nError: {str(e)}\nTimestamp: {__import__('datetime').datetime.now().isoformat()}"
                    try:
                        store.create(f"{file_prefix}error_prev_{file_id}_{file_name}.txt", error_msg)
                    except:
                        pass
            else:
                # File doesn't exist yet - this might be first run after file was added
                # Create a placeholder to indicate versioning was attempted
                placeholder = f"[NO PREVIOUS VERSION]\nFile: {file_name}\nID: {file_id}\nReason: Source file '{src}' not found in artifact storage.\nThis is expected for newly tracked files.\nTimestamp: {__import__('datetime').datetime.now().isoformat()}"
                try:
                    store.create(dst, placeholder)
                except:
                    pass

        {'current_version_index': idx + 1}
    input:
      - bucket_name
      - files_to_version
      - current_version_index
      - file_prefix
    output:
      - current_version_index
    structured_output: true
    transition: CheckVersioningNeeded
  - id: CheckRemovalNeeded
