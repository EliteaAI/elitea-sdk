  - id: CleanupRemovedFileAndAdvance
    type: code
    code:
      type: fixed
      value: |-
        files_to_delete = alita_state.get('files_to_delete', [])
        idx_raw = alita_state.get('current_deletion_index', 0)

        # Defensive: ensure idx is valid integer
        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        # Defensive: validate index and process file cleanup
        if idx >= 0 and idx < len(files_to_delete):
            f = files_to_delete[idx]
            file_id = f.get('id', '')
            file_name = f.get('name', 'unknown')

            bucket_name = alita_state.get('bucket_name')
            store = alita_client.artifact(bucket_name)
            
            # More specific error detection
            def is_error_response(content):
                if not content:
                    return True
                if isinstance(content, dict) and 'error' in content:
                    return True
                content_str = str(content).strip()
                if len(content_str) < 500:
                    content_lower = content_str.lower()
                    if content_lower.startswith('error') or content_lower.startswith('file not found') or content_lower.startswith('does not exist'):
                        return True
                return False
            
            # 1. Rename file_* to file_del_* (preserve last known state)
            src = f"file_{file_id}_{file_name}.txt"
            dst = f"file_del_{file_id}_{file_name}.txt"
            content = store.get(src)
            if not is_error_response(content):
                # Create the archived version
                store.create(dst, content)
                # Delete the original file_* (now that it's preserved as file_del_*)
                try:
                    store.delete(src, check_exists=False)
                except:
                    pass  # Ignore JsNull errors - deletion likely succeeded
            
            # 2. Delete file_prev_* (no longer needed)
            prev_file = f"file_prev_{file_id}_{file_name}.txt"
            try:
                store.delete(prev_file, check_exists=False)
            except:
                pass  # Ignore if doesn't exist or JsNull errors
            
            # 3. Delete file_diff_* (no longer needed)
            diff_file = f"file_diff_{file_id}_{file_name}.txt"
            try:
                store.delete(diff_file, check_exists=False)
            except:
                pass  # Ignore if doesn't exist or JsNull errors

        {'current_deletion_index': idx + 1}
    input:
      - bucket_name
      - files_to_delete
      - current_deletion_index
    output:
      - current_deletion_index
    structured_output: true
    transition: CheckRemovalNeeded
