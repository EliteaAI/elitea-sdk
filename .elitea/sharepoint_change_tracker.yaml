        # Defensive: ensure idx is valid integer
        try:
            idx = int(idx_raw)
        except (ValueError, TypeError):
            idx = 0

        # Defensive: ensure idx is within bounds
        if idx < 0 or idx >= len(files_to_archive):
            idx = 0

        # Get file path
        file_path = ''
        if files_to_archive and idx < len(files_to_archive):
            file_path = files_to_archive[idx].get('path', '')

        {'current_file_path': file_path}
