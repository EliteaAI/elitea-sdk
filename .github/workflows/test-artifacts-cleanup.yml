name: Cleanup Orphaned Test Entities From EliteA
run-name: "Cleanup: ${{ inputs.environment }}${{ inputs.custom_environment && format(' ({0})', inputs.custom_environment) || '' }} | ${{ inputs.dry_run && 'DRY RUN' || 'DELETE' }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (uses secrets: DEPLOYMENT_URL_<ENV>, ELITEA_API_KEY_<ENV>, PROJECT_ID_<ENV>)"
        required: true
        type: choice
        default: dev
        options:
          - dev
          - stage2
          - prod
          - custom
      custom_environment:
        description: "Custom environment name (only when environment=custom). Requires matching secrets."
        required: false
        type: string
        default: ""
      project_id:
        description: "Project ID override (leave empty to use secret PROJECT_ID_<ENV>)"
        required: false
        type: string
        default: ""
      older_than_days:
        description: "Only delete entities older than N days (0 = no age filter)"
        required: true
        type: string
        default: "7"
      scope:
        description: "What to clean up"
        required: false
        type: choice
        default: both
        options:
          - both
          - pipelines-only
          - toolkits-only
      pipeline_tag:
        description: "Delete pipelines with this tag (empty = no tag filter, pattern only)"
        required: false
        type: string
        default: "automation"
      pipeline_pattern:
        description: "Regex pattern for pipeline names (default: ^[a-f0-9]{8}_)"
        required: false
        type: string
        default: ""
      toolkit_pattern:
        description: "Regex pattern for toolkit names (default: -testing-[a-f0-9]{8}$)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run (list targets, do not delete)"
        required: true
        type: boolean
        default: true
      verbose:
        description: "Enable verbose output"
        required: false
        type: boolean
        default: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .elitea/tests/test_pipelines/scripts
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Resolve environment
        id: env
        run: |
          # Resolve environment name (support custom environment)
          if [ "${{ inputs.environment }}" = "custom" ]; then
            if [ -z "${{ inputs.custom_environment }}" ]; then
              echo "::error::Custom environment selected but custom_environment is empty"
              exit 1
            fi
            ENV_NAME="${{ inputs.custom_environment }}"
          else
            ENV_NAME="${{ inputs.environment }}"
          fi

          ENV_UPPER=$(echo "$ENV_NAME" | tr '[:lower:]' '[:upper:]')
          echo "name=$ENV_NAME"   >> "$GITHUB_OUTPUT"
          echo "upper=$ENV_UPPER" >> "$GITHUB_OUTPUT"
          echo "Resolved environment: $ENV_NAME (secrets suffix: $ENV_UPPER)"

      - name: Build cleanup flags
        id: flags
        run: |
          FLAGS="--yes"

          # scope
          SCOPE="${{ inputs.scope || 'both' }}"
          if   [ "$SCOPE" = "pipelines-only" ]; then FLAGS="$FLAGS --pipelines-only"
          elif [ "$SCOPE" = "toolkits-only"  ]; then FLAGS="$FLAGS --toolkits-only"
          fi

          # age filter
          DAYS="${{ inputs.older_than_days }}"
          [ -n "$DAYS" ] && [ "$DAYS" != "0" ] && FLAGS="$FLAGS --older-than-days $DAYS"

          # pipeline tag
          TAG="${{ inputs.pipeline_tag }}"
          [ -n "$TAG" ] && FLAGS="$FLAGS --pipeline-tag $TAG"

          # patterns
          PIPELINE_PATTERN="${{ inputs.pipeline_pattern }}"
          TOOLKIT_PATTERN="${{ inputs.toolkit_pattern }}"
          [ -n "$PIPELINE_PATTERN" ] && FLAGS="$FLAGS --pipeline-pattern $PIPELINE_PATTERN"
          [ -n "$TOOLKIT_PATTERN" ] && FLAGS="$FLAGS --toolkit-pattern $TOOLKIT_PATTERN"

          # dry-run
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi

          # verbose
          if [ "${{ inputs.verbose }}" = "true" ]; then FLAGS="$FLAGS -v"; fi

          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          echo "Cleanup flags: $FLAGS"

      - name: Run CI cleanup
        env:
          API_KEY: ${{ secrets[format('ELITEA_API_KEY_{0}', steps.env.outputs.upper)] }}
          SECRET_BASE_URL: ${{ secrets[format('DEPLOYMENT_URL_{0}', steps.env.outputs.upper)] }}
          SECRET_PROJECT_ID: ${{ secrets[format('PROJECT_ID_{0}', steps.env.outputs.upper)] }}
        run: |
          # Resolve base URL from secret
          BASE_URL="${SECRET_BASE_URL}"
          if [ -z "$BASE_URL" ]; then
            echo "::error::No DEPLOYMENT_URL_${{ steps.env.outputs.upper }} secret found"
            exit 1
          fi

          # Resolve project ID (input override or secret)
          INPUT_PROJECT_ID="${{ inputs.project_id }}"
          if [ -n "$INPUT_PROJECT_ID" ]; then
            PROJECT_ID="$INPUT_PROJECT_ID"
            echo "Using project ID from input: $PROJECT_ID"
          elif [ -n "$SECRET_PROJECT_ID" ]; then
            PROJECT_ID="$SECRET_PROJECT_ID"
            echo "Using project ID from secret"
          else
            echo "::error::No project ID provided and no PROJECT_ID_${{ steps.env.outputs.upper }} secret found"
            exit 1
          fi

          echo "Environment: ${{ steps.env.outputs.name }}"
          echo "Base URL: $BASE_URL"
          echo "Project ID: $PROJECT_ID"

          python .elitea/tests/test_pipelines/scripts/ci_cleanup.py \
            --base-url "$BASE_URL" \
            --project-id "$PROJECT_ID" \
            ${{ steps.flags.outputs.flags }}
