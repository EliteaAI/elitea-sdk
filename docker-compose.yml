
services:
  elitea-sdk:
    image: ghcr.io/eliteaai/elitea-sdk:pyodide
    platform: linux/amd64
    container_name: elitea-sdk-dev
    env_file:
      - .env
    volumes:
      - ./.elitea:/app/.elitea
      - ./elitea_sdk:/app/elitea_sdk
      - ./.git:/app/.git
      - ./github:/app/.github
    command: >
      sh -c "$${DOCKER_COMMAND:-.elitea/tests/test_pipelines/run_test.sh --local --setup -v suites/ado ADO01}"

  pgvector-db:
    image: ankane/pgvector
    container_name: local-elitea-pgvector-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=yourpassword
      - POSTGRES_DB=postgres
    ports:
      - "5435:5432"